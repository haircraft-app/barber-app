<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 20px;
      color: white;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .menu-card {
      height: 70px;
      border-radius: 16px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }

    .menu-card.active {
      outline: 4px solid #fff;
    }

    .programari-list {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .programare-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 14px;
      padding: 8px 10px;
      background: rgba(12, 24, 38, 0.88);
    }

    .programare-nume {
      font-size: 14px;
      font-weight: normal;
      text-align: left;
    }

    .programare-detalii {
      margin-top: 3px;
      font-size: 11px;
      font-weight: normal;
      color: #f2c94c;
      text-align: left;
    }

    .empty-card {
      border-radius: 16px;
      padding: 14px;
      background: rgba(12, 24, 38, 0.72);
      text-align: center;
    }

    .bottom-bar {
      margin-top: auto;
      display: flex;
    }

    .box-btn {
      flex: 1;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="header">
      <div class="title">Programări</div>
      <div class="subtitle">Alege lista</div>
    </div>

    <div class="menu-grid">
      <div class="menu-card active" onclick="selectTab(this, 'azi')">Azi</div>
      <div class="menu-card" onclick="selectTab(this, 'maine')">Mâine</div>
      <div class="menu-card" onclick="selectTab(this, 'toate')">Toate</div>
    </div>

    <div class="programari-list" id="programariList"></div>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    var filtruActiv = 'azi';

    function selectTab(el, filtru) {
      document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filtruActiv = filtru;
      renderProgramari();
    }

    function renderProgramari() {
      const lista = document.getElementById('programariList');
      let programari = JSON.parse(localStorage.getItem('programari_lista') || '[]');

      if (!programari.length) {
        const ultima = JSON.parse(localStorage.getItem('programare_rezultat') || 'null');
        if (ultima) programari = [ultima];
      }

      const azi = getDateIso(0);
      const maine = getDateIso(1);

      if (filtruActiv === 'azi') {
        programari = programari.filter(p => p.zi?.dataIso === azi);
      }

      if (filtruActiv === 'maine') {
        programari = programari.filter(p => p.zi?.dataIso === maine);
      }

      if (!programari.length) {
        lista.innerHTML = '<div class="empty-card">Nu există programări</div>';
        return;
      }

      lista.innerHTML = programari.map(p => {
        return `
          <div class="programare-card">
            <div class="programare-nume">${p.client?.nume || '-'}</div>
            <div class="programare-detalii">${p.interval || '-'}</div>
          </div>
        `;
      }).join('');
    }

    function getDateIso(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    renderProgramari();
  </script>
</body>
</html>
