<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .header {
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 20px;
      color: white;
    }

    .menu-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
    }

    .menu-card {
      height: 45px;
      border-radius: 16px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }

    .menu-card.active {
      outline: 4px solid #fff;
    }

    .programari-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .zi-bloc {
      display: flex;
      flex-direction: column;
      gap: 5px;
      margin-bottom: 8px;
    }

    .zi-titlu {
      color: #ff4040;
      font-size: 15px;
      font-weight: 900;
      padding: 4px 2px 2px;
      text-align: left;
    }

    .programare-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 5px 7px 5px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .programare-text {
      flex: 1;
      min-width: 0;
    }

    .programare-nume {
      font-size: 14px;
      font-weight: normal;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .programare-detalii {
      margin-top: 2px;
      font-size: 11px;
      font-weight: normal;
      color: #f2c94c;
      text-align: left;
    }

    .delete-btn {
      width: 28px;
      height: 28px;
      border-radius: 9px;
      border: none;
      background: #d71920;
      color: #fff;
      font-size: 15px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      flex-shrink: 0;
      line-height: 1;
    }

    .confirm-delete-box {
      margin-top: 5px;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      padding: 7px 8px;
      background: rgba(10, 22, 36, 0.95);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .confirm-delete-text {
      font-size: 12px;
      font-weight: 800;
      color: #fff;
    }

    .confirm-delete-actions {
      display: flex;
      gap: 6px;
    }

    .confirm-small-btn {
      border: none;
      border-radius: 8px;
      padding: 5px 9px;
      color: #fff;
      font-size: 11px;
      font-weight: 800;
      cursor: pointer;
    }

    .confirm-small-btn.ok {
      background: #1fae4b;
    }

    .confirm-small-btn.cancel {
      background: #d71920;
    }

    .programare-card.trecuta .programare-nume {
      color: rgba(255,255,255,0.20);
    }

    .programare-card.trecuta .programare-detalii {
      color: rgba(242,201,76,0.20);
    }

    .empty-card {
      border-radius: 16px;
      padding: 14px;
      background: rgba(12, 24, 38, 0.72);
      text-align: center;
    }

    .bottom-bar {
      margin-top: auto;
      display: flex;
    }

    .box-btn {
      flex: 1;
      height: 45px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="header">
      <div class="title">Programări</div>
      <div class="subtitle">Alege lista</div>
    </div>

    <div class="menu-grid">
      <div class="menu-card active" onclick="selectTab(this, 'azi')">Azi</div>
      <div class="menu-card" onclick="selectTab(this, 'maine')">Mâine</div>
      <div class="menu-card" onclick="selectTab(this, 'toate')">Toate</div>
    </div>

    <div class="programari-list" id="programariList"></div>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    var filtruActiv = 'azi';
    var stergereIndex = null;

    function selectTab(el, filtru) {
      document.querySelectorAll('.menu-card').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      filtruActiv = filtru;
      renderProgramari();
    }

    function renderProgramari() {
      const lista = document.getElementById('programariList');
      let programariOriginale = JSON.parse(localStorage.getItem('programari_lista') || '[]');

      if (!programariOriginale.length) {
        const ultima = JSON.parse(localStorage.getItem('programare_rezultat') || 'null');
        if (ultima) programariOriginale = [ultima];
      }

      const azi = getDateIso(0);
      const maine = getDateIso(1);

      let programari = programariOriginale.map((p, indexOriginal) => {
        return {
          date: p,
          indexOriginal: indexOriginal
        };
      });

      programari = programari.filter(item => item.date.zi && item.date.zi.dataIso && item.date.zi.dataIso >= azi);

      if (filtruActiv === 'azi') {
        programari = programari.filter(item => item.date.zi.dataIso === azi);
      }

      if (filtruActiv === 'maine') {
        programari = programari.filter(item => item.date.zi.dataIso === maine);
      }

      programari.sort((a, b) => {
        const dataA = a.date.zi.dataIso + ' ' + getOraStart(a.date.interval);
        const dataB = b.date.zi.dataIso + ' ' + getOraStart(b.date.interval);
        return dataA.localeCompare(dataB);
      });

      if (!programari.length) {
        lista.innerHTML = '<div class="empty-card">Nu există programări</div>';
        return;
      }

      const grupuri = {};

      programari.forEach(item => {
        if (!grupuri[item.date.zi.dataIso]) grupuri[item.date.zi.dataIso] = [];
        grupuri[item.date.zi.dataIso].push(item);
      });

      lista.innerHTML = Object.keys(grupuri).sort().map(dataIso => {
        const titluZi = getTitluZi(grupuri[dataIso][0].date);

        const carduri = grupuri[dataIso].map(item => {
          const p = item.date;
          const clasaTrecuta = esteProgramareTrecuta(p) ? ' trecuta' : '';
          const confirmare = stergereIndex === item.indexOriginal ? `
            <div class="confirm-delete-box">
              <div class="confirm-delete-text">Confirmă ștergerea</div>
              <div class="confirm-delete-actions">
                <button class="confirm-small-btn ok" onclick="confirmaStergere(${item.indexOriginal})">Confirm</button>
                <button class="confirm-small-btn cancel" onclick="renuntaStergere()">Renunț</button>
              </div>
            </div>
          ` : '';

          return `
            <div>
              <div class="programare-card${clasaTrecuta}">
                <div class="programare-text">
                  <div class="programare-nume">${p.client && p.client.nume ? p.client.nume : '-'}</div>
                  <div class="programare-detalii">${p.interval || '-'}</div>
                </div>
                <button class="delete-btn" onclick="cereStergere(${item.indexOriginal})">🗑</button>
              </div>
              ${confirmare}
            </div>
          `;
        }).join('');

        return `
          <div class="zi-bloc">
            <div class="zi-titlu">${titluZi}</div>
            ${carduri}
          </div>
        `;
      }).join('');
    }

    function cereStergere(indexOriginal) {
      stergereIndex = indexOriginal;
      renderProgramari();
    }

    function renuntaStergere() {
      stergereIndex = null;
      renderProgramari();
    }

    function confirmaStergere(indexOriginal) {
      let lista = JSON.parse(localStorage.getItem('programari_lista') || '[]');

      lista.splice(indexOriginal, 1);
      localStorage.setItem('programari_lista', JSON.stringify(lista));

      stergereIndex = null;
      renderProgramari();
    }

    function esteProgramareTrecuta(programare) {
      if (!programare || !programare.zi || !programare.zi.dataIso || !programare.interval) return false;

      const parti = programare.interval.split('-');
      if (parti.length < 2) return false;

      const oraFinal = parti[1].trim();
      const bucatiOra = oraFinal.split(':');
      if (bucatiOra.length < 2) return false;

      const finalProgramare = new Date(programare.zi.dataIso + 'T' + oraFinal + ':00');
      finalProgramare.setMinutes(finalProgramare.getMinutes() + 15);

      return new Date() >= finalProgramare;
    }

    function getOraStart(interval) {
      if (!interval) return '';
      return interval.split('-')[0].trim();
    }

    function getTitluZi(programare) {
      if (programare.zi && programare.zi.titlu) {
        return programare.zi.titlu;
      }

      if (programare.zi && programare.zi.dataIso) {
        return programare.zi.dataIso;
      }

      return '';
    }

    function getDateIso(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return d.toISOString().split('T')[0];
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    renderProgramari();
  </script>
</body>
</html>
