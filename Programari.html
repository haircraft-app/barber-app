<!DOCTYPE html>
<!--
VERSIUNE: PROGRAMARI_LAYOUT_v1
DATA: 2026-05-01
MODIFICARI:
- pagina Programari
- fundal premium ca Programare noua
- titlu Programari
- buton HOME
- butoane Azi / Maine / Toate
- fara lista programari inca
-->
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 8px;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 20px;
      color: white;
      font-weight: normal;
    }

    .menu-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 10px;

    }

    .menu-card {
    height: 70px;
    border-radius: 16px;
    background: linear-gradient(145deg, #f6d257, #a96f10);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    font-weight: 900;
    color: #111;
    cursor: pointer;
    }

.menu-card.active {
  outline: 4px solid #fff;
    }

    .menu-card.active {
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
    }

    .bottom-bar {
      margin-top: auto;
      display: flex;
      gap: 10px;
    }

    .box-btn {
      flex: 1;
      height: 56px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="header">
      <div class="title">Programări</div>
      <div class="subtitle">Alege lista</div>
    </div>

    <div class="menu-grid">
      <div class="menu-card active" onclick="selectTab(this)">
    <div class="menu-title">Azi</div>
    <div class="menu-sub">Vin 1 Mai</div>
    </div>

    <div class="menu-card" onclick="selectTab(this)">
    <div class="menu-title">Mâine</div>
    <div class="menu-sub">Sâm 2 Mai</div>
    </div>

    <div class="menu-card" onclick="selectTab(this)">
    <div class="menu-title">Toate proramarile</div>
    </div>

    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    function selectTab(el) {
      document.querySelectorAll('.menu-card').forEach(card => {
        card.classList.remove('active');
      });

      el.classList.add('active');
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }
  </script>
</body>
</html>
