<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    /* ===== SETARI GENERALE PAGINA ===== */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ===== HEADER PAGINA ===== */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 4px;
      padding-top: 2px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 2px;
      color: #f2c94c;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-arrow {
      font-size: 20px;
      line-height: 1;
    }

    .title {
      font-size: 25px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 16px;
      color: white;
    }

    /* ===== ECRANE INTERNE ===== */
    .screen {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .screen.active {
      display: flex;
    }

    /* ===== CAUTARE CLIENT SI ZILE ===== */
    .filter-row {
      display: grid;
      grid-template-columns: 1fr 95px;
      gap: 7px;
    }

    .search-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 8px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      align-items: center;
      gap: 8px;
      min-width: 0;
    }

    .search-icon {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1px solid #f2c94c;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2c94c;
      font-size: 15px;
    }

    .search-input {
      width: 100%;
      min-width: 0;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    .days-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      text-align: center;
    }

    .days-label {
      font-size: 9px;
      font-weight: 900;
      color: #f2c94c;
      line-height: 1;
      white-space: nowrap;
    }

    .days-box {
      flex-direction: column;
      justify-content: center;
      gap: 4px;
      padding: 7px 6px;
    }

    /* ===== BUTON CLIENTI FARA PROGRAMARI ===== */
    .no-programari-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 10px 12px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }


    /* ===== LISTA CLIENTI INACTIVI ===== */
    .client-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .client-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 8px 8px 8px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: grid;
      grid-template-columns: 1fr auto 16px;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .client-name {
      font-size: 14px;
      font-weight: normal;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      min-width: 0;
    }

    .client-days {
      font-size: 13px;
      font-weight: 900;
      color: #f2c94c;
      white-space: nowrap;
      text-align: right;
    }

    .arrow {
      color: #f2c94c;
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
      text-align: right;
    }

    .empty-card {
      border-radius: 16px;
      padding: 14px;
      background: rgba(12, 24, 38, 0.72);
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    /* ===== DETALII CLIENT ===== */
    .detail-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 12px;
      background: rgba(12, 24, 38, 0.88);
      text-align: center;
    }

    .detail-name {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .detail-info {
      font-size: 14px;
      color: #f2c94c;
      margin-top: 5px;
      word-break: break-word;
    }

    .detail-note {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.78);
      word-break: break-word;
    }

    .action-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .action-btn {
      width: 100%;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 11px 12px;
      background: rgba(12, 24, 38, 0.88);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      text-align: center;
      cursor: pointer;
    }

    .action-btn.gold {
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      text-align: center;
    }

    /* ===== BARA JOS HOME ===== */
    .bottom-bar {
      margin-top: auto;
      display: flex;
    }

    .box-btn {
      flex: 1;
      height: 45px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }

    /* ===== SIMULARE TELEFON DESKTOP - IDENTIC PG2 ===== */
    @media (min-width: 701px) {

      html, body {
        width: 100%;
        height: 100%;
        overflow: hidden;
      }

      body {
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        background: #000000;
      }

      .page {
        position: relative;
        width: 430px;
        max-width: 430px;
        height: 920px;
        min-height: 920px;
        max-height: 920px;
        margin: 0 auto;
        border-radius: 48px;
        padding: 74px 16px 18px;
        background:
          linear-gradient(180deg, rgba(18,18,18,0.98) 0%, rgba(7,7,7,0.98) 100%);
        border: 3px solid rgba(242,201,76,0.92);
        box-shadow:
          0 0 0 3px rgba(255,255,255,0.05),
          0 0 0 12px #000000,
          0 0 35px rgba(242,201,76,0.30),
          0 45px 90px rgba(0,0,0,0.85);
        overflow: hidden;
        transform-origin: center center;
        transform: scale(min(calc((100vw - 80px) / 430), calc((100vh - 80px) / 920)));
        gap: 10px;
      }

      .page::before {
        content: "";
        position: absolute;
        top: 22px;
        left: 50%;
        transform: translateX(-50%);
        width: 170px;
        height: 35px;
        background: #000000;
        border-radius: 28px;
        z-index: 5;
      }

      .page::after {
        content: "";
        position: absolute;
        top: 36px;
        left: 50%;
        transform: translateX(-50%);
        width: 58px;
        height: 7px;
        background: #222222;
        border-radius: 20px;
        z-index: 6;
      }

      .screen.active {
        display: flex;
        flex: 1;
        min-height: 0;
        overflow: hidden;
      }

      #screenList {
        flex: 1;
        min-height: 0;
      }

      .client-list {
        flex: 1;
        min-height: 0;
        max-height: 100%;
        overflow-y: auto;
        overflow-x: hidden;
        padding-right: 3px;
      }

      #screenDetails {
        overflow-y: auto;
        padding-right: 3px;
      }
    }
  </style>

  <!-- ===== SUPABASE - CONECTARE BAZĂ DE DATE ===== -->
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const supabaseClient = window.supabase.createClient(
      'https://hnvqauxqxtdzgyqumkqa.supabase.co',
      'sb_publishable_k1pGTW92yAbLX3PKRQjFpQ_0AQBRker'
    );
  </script>

</head>

<body>
  <div class="page">

    <!-- ===== HEADER ===== -->
    <div class="header">
      <div class="back-btn" onclick="goBack()">
        <span class="back-arrow">←</span>
        <span>ÎNAPOI</span>
      </div>

      <div class="title">Clienți inactivi</div>
      <div class="subtitle">Găsește clienții care nu au mai venit</div>
    </div>

    <!-- ===== ECRAN LISTA CLIENTI INACTIVI ===== -->
    <div id="screenList" class="screen active">
      <div class="filter-row">
        <div class="search-card">
          <div class="search-icon">⌕</div>
          <input id="searchInput" class="search-input" placeholder="Caută client..." oninput="renderInactiveClients()">
        </div>

        <div class="search-card days-box">
          <div class="days-label">ZILE MIN.</div>
          <input id="daysInput" class="days-input" type="number" min="1" value="1" oninput="renderInactiveClients()">
        </div>
      </div>

      <button id="noProgramariBtn" class="no-programari-btn" onclick="toggleClientiFaraProgramari()">CLIENȚI FĂRĂ PROGRAMĂRI</button>

      <div id="clientList" class="client-list"></div>
    </div>

    <!-- ===== ECRAN DETALII CLIENT INACTIV ===== -->
    <div id="screenDetails" class="screen">
      <div class="detail-card">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-info" id="detailPhone"></div>
        <div class="detail-info" id="detailEmail"></div>
        <div class="detail-info" id="detailBirthday"></div>
        <div class="detail-info" id="detailLastAppointment"></div>
        <div class="detail-info" id="detailInactiveDays"></div>
        <div class="detail-info" id="detailNrProgramari"></div>
        <div class="detail-info" id="detailLastService"></div>
        <div class="detail-note" id="detailNotes"></div>
      </div>

      <div class="action-list">
        <button class="action-btn gold" onclick="sendWhatsapp()">WHATSAPP</button>
        <button class="action-btn" onclick="callClient()">SUNĂ</button>
      </div>
    </div>

    <!-- ===== BUTON HOME JOS ===== -->
    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    /* ===== DATE GLOBALE ===== */
    var clients = [];
    var programariIstoric = [];
    var inactiveClients = [];
    var currentClientId = null;
    var afiseazaFaraProgramari = false;

    /* ===== CURATARE TELEFON ===== */
    function curataTelefon(telefon) {
      return String(telefon || '').replace(/[^0-9]/g, '');
    }

    /* ===== DATA AZI FARA ORA ===== */
    function getAziFaraOra() {
      var azi = new Date();
      return new Date(azi.getFullYear(), azi.getMonth(), azi.getDate());
    }

    /* ===== DIFERENTA ZILE ===== */
    function calculeazaZileTrecute(dataText) {
      if (!dataText) return null;

      var parti = String(dataText).split('-');
      if (parti.length !== 3) return null;

      var dataProgramare = new Date(Number(parti[0]), Number(parti[1]) - 1, Number(parti[2]));
      var diferentaMs = getAziFaraOra() - dataProgramare;

      return Math.floor(diferentaMs / 86400000);
    }

    /* ===== FORMATARE DATA ROMANEASCA ===== */
    function formateazaData(dataText) {
      if (!dataText) return '-';

      var parti = String(dataText).split('-');
      if (parti.length !== 3) return dataText;

      return parti[2] + '.' + parti[1] + '.' + parti[0];
    }

    /* ===== VERIFICARE PROGRAMARE REALIZATA ===== */
    function esteProgramareRealizata(programare) {
      if (!programare) return false;
      if (programare.status === 'stearsa') return false;
      if (!programare.data || !programare.ora_final) return false;

      var finalProgramare = new Date(programare.data + 'T' + programare.ora_final + ':00');

      return new Date() >= finalProgramare;
    }

    /* ===== INCARCARE CLIENTI SI PROGRAMARI DIN SUPABASE ===== */
    async function loadInactiveData() {
      var box = document.getElementById('clientList');
      box.innerHTML = '<div class="empty-card">Se încarcă...</div>';

      const { data: clientiData, error: clientiError } = await supabaseClient
        .from('clienti')
        .select('*')
        .order('nume', { ascending: true });

      if (clientiError) {
        console.log('EROARE CLIENTI SUPABASE:', clientiError);
        box.innerHTML = '<div class="empty-card">Eroare la citirea clienților.</div>';
        return;
      }

      const { data: programariData, error: programariError } = await supabaseClient
        .from('programari')
        .select('*');

      if (programariError) {
        console.log('EROARE PROGRAMARI SUPABASE:', programariError);
        box.innerHTML = '<div class="empty-card">Eroare la citirea programărilor.</div>';
        return;
      }

      programariIstoric = programariData || [];

      clients = (clientiData || []).map(function(c) {
        var info = calculeazaInfoClient(c);

        return {
          id: c.id,
          nume: c.nume || '',
          telefon: c.telefon || '',
          email: c.email || '',
          data_nastere: c.data_nastere || '',
          notite: c.notite || '',
          ultima_programare: info.ultima_programare,
          zile_inactiv: info.zile_inactiv,
          nr_programari: info.nr_programari,
          ultimul_serviciu: info.ultimul_serviciu
        };
      });

      renderInactiveClients();
    }

    /* ===== CALCUL INFO CLIENT DUPA ULTIMA PROGRAMARE ===== */
    function calculeazaInfoClient(client) {
      var telClient = curataTelefon(client.telefon);

      var programariClient = programariIstoric.filter(function(p) {
        if (!telClient) return false;
        if (curataTelefon(p.telefon) !== telClient) return false;
        return esteProgramareRealizata(p);
      });

      programariClient.sort(function(a, b) {
        var dataA = String(a.data || '') + ' ' + String(a.ora_final || '');
        var dataB = String(b.data || '') + ' ' + String(b.ora_final || '');
        return dataB.localeCompare(dataA);
      });

      var ultima = programariClient[0] || null;
      var zile = ultima ? calculeazaZileTrecute(ultima.data) : null;

      return {
        ultima_programare: ultima || null,
        zile_inactiv: zile,
        nr_programari: programariClient.length,
        ultimul_serviciu: ultima ? gasesteServiciuProgramare(ultima) : ''
      };
    }

    /* ===== GASIRE SERVICIU DIN PROGRAMARE DACA EXISTA IN BAZA ===== */
    function gasesteServiciuProgramare(programare) {
      return programare.serviciu ||
             programare.servicii ||
             programare.tip_serviciu ||
             programare.denumire_serviciu ||
             programare.observatii ||
             '';
    }

    /* ===== AFISARE ECRANE ===== */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(screen) {
        screen.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
    }

    /* ===== AFISARE LISTA CLIENTI INACTIVI ===== */
    function renderInactiveClients() {
      var box = document.getElementById('clientList');
      var q = document.getElementById('searchInput').value.toLowerCase().trim();
      var zileMinime = Number(document.getElementById('daysInput').value || 0);

      if (afiseazaFaraProgramari === true) {
        renderClientiFaraProgramari();
        return;
      }

      if (!zileMinime || zileMinime < 1) {
        box.innerHTML = '<div class="empty-card">Introdu numărul minim de zile.</div>';
        return;
      }

      inactiveClients = clients
        .filter(function(c) {
          if (c.zile_inactiv === null || c.zile_inactiv === undefined) return false;
          if (Number(c.zile_inactiv) < zileMinime) return false;

          return String(c.nume || '').toLowerCase().indexOf(q) !== -1 ||
                 String(c.telefon || '').toLowerCase().indexOf(q) !== -1;
        })
        .sort(function(a, b) {
          return Number(b.zile_inactiv || 0) - Number(a.zile_inactiv || 0);
        });

      if (!inactiveClients.length) {
        box.innerHTML = '<div class="empty-card">Nu există clienți inactivi pentru acest număr de zile.</div>';
        return;
      }

      box.innerHTML = inactiveClients.map(function(c) {
        return `
          <div class="client-card" onclick="openDetails('${c.id}')">
            <div class="client-name">${escapeHtml(c.nume)}</div>
            <div class="client-days">${Number(c.zile_inactiv || 0)} zile</div>
            <div class="arrow">›</div>
          </div>
        `;
      }).join('');
    }

    /* ===== AFISARE CLIENTI FARA PROGRAMARI ===== */
    function toggleClientiFaraProgramari() {
      afiseazaFaraProgramari = !afiseazaFaraProgramari;

      var btn = document.getElementById('noProgramariBtn');
      if (btn) {
        btn.textContent = afiseazaFaraProgramari ? 'ÎNAPOI LA CLIENȚI INACTIVI' : 'CLIENȚI FĂRĂ PROGRAMĂRI';
      }

      renderInactiveClients();
    }

    function renderClientiFaraProgramari() {
      var box = document.getElementById('clientList');
      var q = document.getElementById('searchInput').value.toLowerCase().trim();

      inactiveClients = clients
        .filter(function(c) {
          if (Number(c.nr_programari || 0) !== 0) return false;

          return String(c.nume || '').toLowerCase().indexOf(q) !== -1 ||
                 String(c.telefon || '').toLowerCase().indexOf(q) !== -1;
        })
        .sort(function(a, b) {
          return String(a.nume || '').localeCompare(String(b.nume || ''));
        });

      if (!inactiveClients.length) {
        box.innerHTML = '<div class="empty-card">Nu există clienți fără programări.</div>';
        return;
      }

      box.innerHTML = inactiveClients.map(function(c) {
        return `
          <div class="client-card" onclick="openDetails('${c.id}')">
            <div class="client-name">${escapeHtml(c.nume)}</div>
            <div class="client-days">fără programări</div>
            <div class="arrow">›</div>
          </div>
        `;
      }).join('');
    }

    /* ===== DETALII CLIENT INACTIV ===== */
    function openDetails(id) {
      currentClientId = id;

      var c = clients.find(function(x) {
        return String(x.id) === String(id);
      });

      if (!c) return;

      var ultima = c.ultima_programare || null;
      var interval = ultima ? String(ultima.ora_start || '') + ' - ' + String(ultima.ora_final || '') : '-';

      document.getElementById('detailName').textContent = c.nume || '-';
      document.getElementById('detailPhone').textContent = c.telefon ? 'Telefon: ' + c.telefon : 'Telefon: -';
      document.getElementById('detailEmail').textContent = c.email ? 'Email: ' + c.email : 'Email: -';
      document.getElementById('detailBirthday').textContent = c.data_nastere ? 'Data naștere: ' + c.data_nastere : 'Data naștere: -';
      document.getElementById('detailLastAppointment').textContent = ultima ? 'Ultima programare: ' + formateazaData(ultima.data) + ' · ' + interval : 'Ultima programare: -';
      document.getElementById('detailInactiveDays').textContent = c.zile_inactiv === null || c.zile_inactiv === undefined ? 'Nu a mai venit de: fără programări' : 'Nu a mai venit de: ' + Number(c.zile_inactiv || 0) + ' zile';
      document.getElementById('detailNrProgramari').textContent = 'Programări realizate: ' + Number(c.nr_programari || 0);
      document.getElementById('detailLastService').textContent = c.ultimul_serviciu ? 'Ultimul serviciu: ' + c.ultimul_serviciu : 'Ultimul serviciu: -';
      document.getElementById('detailNotes').textContent = c.notite ? c.notite : '';

      showScreen('screenDetails');
    }

    /* ===== WHATSAPP CLIENT ===== */
    function sendWhatsapp() {
      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c || !c.telefon) return;

      var telefon = curataTelefon(c.telefon);
      if (telefon.startsWith('0')) {
        telefon = '40' + telefon.substring(1);
      }

      var mesaj = `Salut!
Am observat că nu ai mai venit de ${c.zile_inactiv || 0} zile.
Dacă vrei să te programezi, mă poți suna sau îmi poți scrie aici.
Mulțumesc!`;

      window.open('https://wa.me/' + telefon + '?text=' + encodeURIComponent(mesaj), '_blank');
    }

    /* ===== APEL CLIENT ===== */
    function callClient() {
      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c || !c.telefon) return;

      var telefonApel = String(c.telefon || '').replace(/[^0-9+]/g, '');

      window.location.href = 'tel:' + telefonApel;
    }

    /* ===== NAVIGARE ===== */
    function goBack() {
      var detailsActive = document.getElementById('screenDetails').classList.contains('active');

      if (detailsActive) {
        showScreen('screenList');
        return;
      }

      goHome();
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* ===== PROTECTIE TEXT ===== */
    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    /* ===== PORNIRE PAGINA ===== */
    loadInactiveData();
  </script>
</body>
</html>
