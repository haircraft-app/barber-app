<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #a67c00, #000);
      color: #fff;
    }

    .page {
      padding: 15px;
      display: flex;
      flex-direction: column;
      gap: 10px;
      min-height: 100vh;
    }

    .header {
      text-align: center;
      position: relative;
    }

    .title {
      color: #f2c94c;
      font-size: 24px;
      font-weight: 900;
    }

    .subtitle {
      font-size: 22px;
    }

    .nav-back {
      position:absolute;
      left:0;
      top:0;
      cursor:pointer;
    }

    .nav-back span {
      color:red;
      font-weight:bold;
    }

    .steps {
      display:flex;
      justify-content:center;
      gap:10px;
    }

    .step {
      width:30px;
      height:30px;
      border-radius:50%;
      border:2px solid gold;
      display:flex;
      align-items:center;
      justify-content:center;
    }

    .active {
      background: gold;
      color:black;
    }

    .card {
      background:#0b1b2b;
      padding:10px;
      border-radius:10px;
    }

    .label {
      font-size:12px;
      color:#ccc;
    }

    .value {
      font-size:18px;
      font-weight:bold;
    }

    .bottom {
      margin-top:auto;
    }

    .btn {
      width:100%;
      padding:15px;
      background:gold;
      border:none;
      font-weight:bold;
      border-radius:10px;
      font-size:18px;
    }
  </style>
</head>

<body>

<div class="page">

  <div class="header">
    <div class="nav-back" onclick="goBack()">← <span>BACK</span></div>

    <div class="title">Programare nouă</div>
    <div class="subtitle">Trimite confirmare</div>
  </div>

  <div class="steps">
    <div class="step">1</div>
    <div class="step">2</div>
    <div class="step">3</div>
    <div class="step active">4</div>
  </div>

  <div class="card">
    <div class="label">Client selectat</div>
    <div class="value" id="client">-</div>
  </div>

  <div class="card">
    <div class="label">Durată selectată</div>
    <div class="value" id="durata">-</div>
  </div>

  <div class="card">
    Confirmarea va fi trimisă clientului
  </div>

  <div class="bottom">
    <button class="btn" onclick="goHome()">HOME</button>
  </div>

</div>

<script>
  var client = JSON.parse(localStorage.getItem('programare_client') || 'null');
  var durata = localStorage.getItem('programare_durata') || 60;

  if(client){
    document.getElementById('client').innerText = client.nume;
  }

  document.getElementById('durata').innerText = durata + " minute";

  function goBack(){
    window.location.href = "Programare_noua_premium_pg3.html";
  }

  function goHome(){
    window.location.href = "index_premium.html";
  }
</script>

</body>
</html>
