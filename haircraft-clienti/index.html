<!DOCTYPE html>
<html lang="ro">
<head>
  <!-- BLOC 1 - SETĂRI PWA ȘI TELEFON -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HairCraft Clienti</title>

  <!-- BLOC 2 - FONT -->
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">

  <style>
    /* BLOC 3 - SETĂRI GENERALE */
    * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: 'Montserrat', Arial, sans-serif;
      background: #020202;
      color: #ffffff;
    }

    body {
      min-height: 100vh;
      background: radial-gradient(circle at top center, rgba(120,82,10,0.34) 0%, rgba(0,0,0,0.96) 42%, #000 100%);
      overflow-x: hidden;
    }

    a { color: inherit; text-decoration: none; display: block; }

    /* BLOC 4 - PAGINA PRINCIPALĂ CLIENT */
    .app {
      width: 100%;
      min-height: 100vh;
      padding: 10px 8px 12px;
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    /* BLOC 5 - SIGLA ROȘIE */
    .header {
      text-align: center;
      line-height: 0;
      padding-top: 8px;
    }

    .logo-box {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: min(58vw, 210px);
      filter: drop-shadow(0 0 13px rgba(180,0,0,0.50));
      margin-bottom: 12px;
    }

    .logo-box img { width: 100%; height: auto; display: block; }

    /* BLOC 6 - TELEFON CLIENT */
    .phone-card {
      border-radius: 7px;
      border: 1px solid #b98b18;
      background: linear-gradient(145deg, #1a1a1a 0%, #070707 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 5px 12px rgba(0,0,0,0.60);
      padding: 10px 10px 11px;
      color: #ffffff;
    }

    .phone-label {
      font-size: 12px;
      line-height: 1;
      font-weight: 900;
      color: #f2c94c;
      letter-spacing: 0.4px;
      margin-bottom: 8px;
      text-align: center;
    }

    .phone-row {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 7px;
      align-items: center;
    }

    .phone-prefix,
    .phone-input {
      height: 42px;
      border-radius: 7px;
      border: 1px solid #b98b18;
      background: #050505;
      color: #f2c94c;
      font-family: 'Montserrat', Arial, sans-serif;
      font-size: 16px;
      font-weight: 900;
      text-align: center;
      outline: none;
    }

    .phone-input { text-align: left; padding: 0 12px; color: #ffffff; }

    .phone-note {
      margin-top: 7px;
      font-size: 8px;
      line-height: 1.2;
      color: rgba(255,255,255,0.78);
      text-align: center;
      font-weight: 600;
    }

    /* BLOC 7 - MENIU CLIENT */
    .client-menu {
      margin-top: auto;
      margin-bottom: auto;
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
    }

    .quick-card {
      min-height: 66px;
      border-radius: 7px;
      border: 1px solid #b98b18;
      background: linear-gradient(145deg, #1a1a1a 0%, #070707 100%);
      box-shadow: inset 0 1px 0 rgba(255,255,255,0.08), 0 5px 12px rgba(0,0,0,0.60);
      padding: 9px 10px;
      display: grid;
      grid-template-columns: 25px 1fr 15px;
      align-items: center;
      gap: 8px;
      color: #ffffff;
      cursor: pointer;
    }

    .quick-icon {
      width: 21px;
      height: 21px;
      color: #f2c94c;
      filter: drop-shadow(0 0 5px rgba(242,201,76,0.42));
    }

    .quick-text { display: flex; flex-direction: column; justify-content: center; min-width: 0; }

    .quick-main {
      font-size: 15px;
      line-height: 1;
      font-weight: 900;
      color: #f2c94c;
      letter-spacing: 0.4px;
    }

    .quick-sub {
      font-size: 9px;
      line-height: 1.15;
      color: #ffffff;
      font-weight: 700;
      margin-top: 5px;
    }

    .quick-tip { color: #f2c94c; font-size: 22px; line-height: 1; font-weight: 500; text-align: right; }

    /* BLOC 8 - PC / TABLETĂ */
    @media (min-width: 701px) {
      .app { max-width: 430px; margin: 0 auto; }
    }
  </style>
</head>
