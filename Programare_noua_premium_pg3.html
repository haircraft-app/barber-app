<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top left, rgba(218, 170, 85, 0.16), transparent 32%),
        linear-gradient(160deg, #06111c 0%, #0b1724 45%, #03070d 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 22px 16px 18px;
      display: flex;
      flex-direction: column;
      gap: 13px;
    }

    .top {
      position: relative;
      text-align: center;
      padding-top: 4px;
    }

    .back {
      position: absolute;
      left: 0;
      top: -2px;
      font-size: 44px;
      color: #f3c363;
      line-height: 1;
      cursor: pointer;
      font-weight: 300;
    }

    .title {
      margin: 0;
      font-size: 28px;
      line-height: 1.1;
      font-weight: 900;
      color: #fff;
    }

    .info-card {
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 16px;
      padding: 18px 18px;
      display: flex;
      align-items: center;
      gap: 16px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 12px 28px rgba(0,0,0,0.22);
    }

    .info-card.duration-card {
      justify-content: space-between;
    }

    .icon-circle {
      width: 58px;
      height: 58px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe28a, #d99a35);
      color: #071320;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 32px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .info-label {
      font-size: 21px;
      color: rgba(255,255,255,0.72);
      margin-bottom: 6px;
      font-weight: 800;
    }

    .info-value {
      font-size: 30px;
      font-weight: 900;
      color: #fff;
      line-height: 1.05;
    }

    .change-btn {
      border: 2px solid #f4c363;
      border-radius: 18px;
      padding: 18px 28px;
      color: #f4c363;
      font-size: 32px;
      font-weight: 900;
      background: rgba(244,195,99,0.08);
      cursor: pointer;
    }

    .section-title {
      margin-top: 4px;
      display: flex;
      align-items: center;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
    }

    .days-row {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
    }

    .day-card {
      position: relative;
      min-height: 96px;
      border: 1px solid rgba(255,255,255,0.14);
      border-radius: 12px;
      background: rgba(12, 24, 38, 0.86);
      color: #fff;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      box-shadow: 0 8px 18px rgba(0,0,0,0.17);
    }

    .day-card.selected {
      border: 2px solid #f4c363;
    }

    .day-card.selected::after {
      content: "";
      position: absolute;
      bottom: -7px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: #f4c363;
    }

    .day-name {
      font-size: 24px;
      margin-bottom: 5px;
      font-weight: 900;
    }

    .day-number {
      font-size: 28px;
      font-weight: 900;
      line-height: 1;
    }

    .day-month {
      margin-top: 5px;
      font-size: 24px;
      font-weight: 900;
      color: rgba(255,255,255,0.9);
    }

    .availability-title {
      margin-top: 6px;
      display: flex;
      align-items: flex-start;
      gap: 8px;
      color: #f4c363;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      line-height: 1.28;
    }

    .slots-grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 7px;
      flex: 1;
    }

    .slot {
      height: 112px;
      border-radius: 14px;
      border: 1px solid rgba(255,255,255,0.28);
      background: rgba(12, 24, 38, 0.76);
      color: rgba(255,255,255,1);
      font-size: 42px;
      font-weight: 900;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      user-select: none;
      letter-spacing: -0.5px;
    }

    .slot.occupied {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }
    .slot.past {
     color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
}
    .slot.selected-range {
      border: 4px solid #ff2020;
      color: rgba(255,255,255,1);
      background: rgba(255, 0, 0, 0.035);
    }

    .slot.confirmed {
      color: rgba(255,255,255,0.20);
      border-color: rgba(255,255,255,0.15);
      background: rgba(255,255,255,0.035);
      cursor: not-allowed;
    }

    .message-box {
      border: 1px solid rgba(255,255,255,0.16);
      border-radius: 16px;
      padding: 20px 18px;
      display: flex;
      align-items: center;
      gap: 13px;
      background: rgba(10, 22, 36, 0.9);
      min-height: 150px;
    }

    .message-icon {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      border: 2px solid #f4c363;
      color: #f4c363;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 31px;
      flex-shrink: 0;
      font-weight: 900;
    }

    .message-main {
      font-size: 35px;
      line-height: 1.08;
      color: #fff;
      font-weight: 900;
    }

    .message-red {
      color: #ff4040;
      font-weight: 900;
    }

    .message-green {
      color: #58d45f;
      font-weight: 900;
    }

    .confirm-btn {
      width: 100%;
      border: none;
      border-radius: 18px;
      padding: 19px 16px;
      background: linear-gradient(135deg, #ffe38d 0%, #e2a646 58%, #c8892f 100%);
      color: #06111c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 16px 34px rgba(0,0,0,0.34);
    }

    .confirm-btn.disabled {
      opacity: 0.45;
      cursor: not-allowed;
      filter: grayscale(0.25);
    }

    .confirm-icon {
      font-size: 33px;
    }

    .confirm-title {
      font-size: 23px;
      line-height: 1.05;
    }

    .confirm-sub {
      font-size: 15px;
      font-weight: 600;
      margin-top: 5px;
    }

    @media (max-width: 430px) {
      .info-label { font-size: 22px; }
      .info-value { font-size: 30px; }
      .icon-circle { width: 52px; height: 52px; font-size: 29px; }
      .change-btn { font-size: 24px; padding: 14px 20px; }
      .day-card { min-height: 86px; }
      .day-name { font-size: 18px; }
      .day-number { font-size: 24px; }
      .day-month { font-size: 18px; }
      .slot { height: 86px; font-size: 31px; }
      .message-main { font-size: 25px; }
      .message-box { min-height: 126px; }
    }

    @media (max-width: 390px) {
      .page { padding: 18px 12px 14px; gap: 10px; }
      .title { font-size: 25px; }
      .slot { height: 78px; font-size: 28px; }
      .message-main { font-size: 34px; }
    }
  </style>
</head>

<body>
  <div class="page">

    <div class="top">
      <div class="back" onclick="goBack()">‹</div>
      <h1 class="title">Alege ziua și ora</h1>
    </div>

    <div class="info-card">
      <div class="icon-circle">👤</div>
      <div>
        <div class="info-label">Client selectat</div>
        <div class="info-value" id="clientName">-</div>
      </div>
    </div>

    <div class="info-card duration-card">
      <div style="display:flex; align-items:center; gap:13px;">
        <div class="icon-circle">◷</div>
        <div>
          <div class="info-label">Durată selectată</div>
          <div class="info-value"><span id="durationText">60 minute</span></div>
        </div>
      </div>
      <button class="change-btn" onclick="changeDuration()">Schimbă</button>
    </div>

    <div class="section-title">▣ Zile disponibile</div>

    <div class="days-row" id="daysRow"></div>

    <div class="availability-title">
      <span>◷</span>
      <span id="availabilityTitle">Ore disponibile</span>
    </div>

    <div class="slots-grid" id="slotsGrid"></div>

    <div class="message-box">
      <div class="message-icon" id="messageIcon">i</div>
      <div class="message-main" id="messageText">Alege ora.</div>
    </div>

    <button class="confirm-btn disabled" id="confirmBtn" onclick="confirmAppointment()">
      <div class="confirm-icon">▣</div>
      <div>
        <div class="confirm-title">CONFIRMĂ CEREREA</div>
        <div class="confirm-sub">Trimite cererea de programare</div>
      </div>
    </button>

  </div>

  <script>
    const SUPABASE_URL = "https://hnvqauxqxtdzgyqumkqa.supabase.co";
    const SUPABASE_KEY = "sb_publishable_k1pGTW92yAbLX3PKRQjFpQ_0AQBRker";

    var durataSelectata = 60;
    var sloturiNecesare = durataSelectata / 30;
    var ziSelectataIndex = 0;
    var oraSelectataIndex = null;
    var confirmata = false;

    var clientId = "";
    var clientNume = "";
    var clientTelefon = "";

    var zile = [];
    var programari = [];

    var sloturi = [
      '08:00', '08:30', '09:00', '09:30',
      '10:00', '10:30', '11:00', '11:30',
      '12:00', '12:30', '13:00', '13:30',
      '14:00', '14:30', '15:00', '15:30',
      '16:00', '16:30', '17:00', '17:30',
      '18:00', '18:30', '19:00', '19:30',
      '20:00', '20:30', '21:00', '21:30'
    ];

    function genereazaZileDinamice() {
      var zileScurte = ['Du', 'Lu', 'Ma', 'Mi', 'Joi', 'Vi', 'Sa'];
      var zileLungi = ['DUMINICĂ', 'LUNI', 'MARȚI', 'MIERCURI', 'JOI', 'VINERI', 'SÂMBĂTĂ'];
      var luni = ['Ian', 'Feb', 'Mar', 'Apr', 'Mai', 'Iun', 'Iul', 'Aug', 'Sep', 'Oct', 'Noi', 'Dec'];

      zile = [];

      var azi = new Date();

      for (var i = 0; i < 7; i++) {
        var d = new Date(azi);
        d.setDate(azi.getDate() + i);

        var ziSapt = d.getDay();
        var nrZi = String(d.getDate());
        var luna = luni[d.getMonth()];
        var dataIso = formatDateIso(d);

        zile.push({
          nume: zileScurte[ziSapt],
          nr: nrZi,
          luna: luna,
          titlu: zileLungi[ziSapt] + ', ' + nrZi + ' ' + luna,
          dataIso: dataIso
        });
      }
    }

    async function init() {
      genereazaZileDinamice();

      clientId = localStorage.getItem("client_id") || "";
      clientNume = localStorage.getItem("client_nume") || "-";
      clientTelefon = localStorage.getItem("client_telefon") || "";
      var durata = localStorage.getItem("durata_programare") || "60";

      durataSelectata = Number(durata);
      sloturiNecesare = durataSelectata / 30;

      document.getElementById("clientName").textContent = clientNume;
      document.getElementById("durationText").textContent = durataSelectata + " minute";

      renderDays();
      updateAvailabilityTitle();
      await loadProgramari();
      renderSlots();
    }

    async function loadProgramari() {
      try {
        var res = await fetch(
          SUPABASE_URL + "/rest/v1/programari?select=id,client_id,nume,telefon,data,ora_start,durata,status,confirmare_trimisa,reminder_trimis,anulat&anulat=eq.false&order=data.asc&order=ora_start.asc",
          {
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY
            }
          }
        );

        if (!res.ok) throw new Error("Nu pot citi programarile.");

        programari = await res.json();

      } catch (err) {
        programari = [];
        updateMessageCustom("Nu pot citi programarile.");
        console.log(err);
      }
    }

    function renderDays() {
      var wrap = document.getElementById('daysRow');
      wrap.innerHTML = '';

      zile.forEach(function(zi, index) {
        var div = document.createElement('div');
        div.className = 'day-card' + (index === ziSelectataIndex ? ' selected' : '');
        div.onclick = function() { selectDay(index); };

        div.innerHTML =
          '<div class="day-name">' + zi.nume + '</div>' +
          '<div class="day-number">' + zi.nr + '</div>' +
          '<div class="day-month">' + zi.luna + '</div>';

        wrap.appendChild(div);
      });
    }

    function renderSlots() {
      var grid = document.getElementById('slotsGrid');
      grid.innerHTML = '';

      var ocupate = getOcupatePentruZi();

      sloturi.forEach(function(slot, index) {
        var div = document.createElement('div');
        div.className = 'slot';
        const azi = new Date();
        const ziSelectata = new Date(zile[ziSelectataIndex].dataIso);

        if (zile[ziSelectataIndex].dataIso === formatDateIso(azi)) {
        const oraCurenta = azi.getHours() * 60 + azi.getMinutes();
        const oraSlot = 8 * 60 + (index * 30);

        if (oraSlot < oraCurenta) {
    div.classList.add('past');
        }
      }

        if (ocupate.indexOf(index) !== -1) {
          div.classList.add('occupied');
        }

        if (confirmata && esteInInterval(index)) {
          div.classList.add('confirmed');
        } else if (!confirmata && esteInInterval(index)) {
          div.classList.add('selected-range');
        }

        div.textContent = slot;
        div.onclick = function() { selectSlot(index); };

        grid.appendChild(div);
      });
    }

    function selectDay(index) {
      ziSelectataIndex = index;
      oraSelectataIndex = null;
      confirmata = false;

      renderDays();
      updateAvailabilityTitle();
      renderSlots();
      resetMessage();
      setConfirmEnabled(false);
      resetButton();
    }

    function selectSlot(index) {
      if (confirmata) return;

      oraSelectataIndex = index;
      renderSlots();

      if (!intervalEsteLiber()) {
        updateMessageOccupied();
        setConfirmEnabled(false);
        speakText('Interval ocupat');
        return;
      }

      updateMessageFree();
      setConfirmEnabled(true);
    }

    function esteInInterval(index) {
      if (oraSelectataIndex === null) return false;
      return index >= oraSelectataIndex && index < oraSelectataIndex + sloturiNecesare;
    }

    function intervalEsteLiber() {

  const azi = new Date();
  const ziSelectata = new Date(zile[ziSelectataIndex].dataIso);

  if (zile[ziSelectataIndex].dataIso === formatDateIso(azi)) {
    const oraCurenta = azi.getHours() * 60 + azi.getMinutes();
    const oraSlot = 8 * 60 + (oraSelectataIndex * 30);

    if (oraSlot < oraCurenta) {
      return false;
    }
  }

  // restul codului tău rămâne sub
      if (oraSelectataIndex === null) return false;

      var ocupate = getOcupatePentruZi();

      if (oraSelectataIndex + sloturiNecesare > sloturi.length) {
        return false;
      }

      for (var i = 0; i < sloturiNecesare; i++) {
        if (ocupate.indexOf(oraSelectataIndex + i) !== -1) {
          return false;
        }
      }

      return true;
    }

    function getOcupatePentruZi() {
      var dataSelectata = zile[ziSelectataIndex].dataIso;
      var ocupate = [];

      programari.forEach(function(p) {
        if (p.data !== dataSelectata) return;

        var startIndex = sloturi.indexOf(String(p.ora_start || "").slice(0,5));
        if (startIndex === -1) return;

        var durata = Number(p.durata || 30);
        var bucati = durata / 30;

        for (var i = 0; i < bucati; i++) {
          ocupate.push(startIndex + i);
        }
      });

      return ocupate;
    }

    function getEndTime(startIndex) {
      var totalMinutes = 8 * 60 + (startIndex * 30) + durataSelectata;
      var h = Math.floor(totalMinutes / 60);
      var m = totalMinutes % 60;

      return String(h).padStart(2, '0') + ':' + String(m).padStart(2, '0');
    }

    function getIntervalText() {
      if (oraSelectataIndex === null) return '';
      return sloturi[oraSelectataIndex] + ' - ' + getEndTime(oraSelectataIndex);
    }

    function speakText(text) {
      try {
        var msg = new SpeechSynthesisUtterance(text);
        msg.lang = 'ro-RO';
        msg.rate = 1.4;
        window.speechSynthesis.cancel();
        window.speechSynthesis.speak(msg);
      } catch(e) {}
    }

    function updateAvailabilityTitle() {
      document.getElementById('availabilityTitle').innerHTML =
        'Ore disponibile pentru<br>' + zile[ziSelectataIndex].titlu;
    }

    function resetMessage() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML = 'Alege ora.';
    }

    function updateMessageFree() {
      document.getElementById('messageIcon').textContent = 'i';
      document.getElementById('messageIcon').style.borderColor = '#f4c363';
      document.getElementById('messageIcon').style.color = '#f4c363';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">' + getIntervalText() + '</span><br>' +
        'Interval liber.';
    }

    function updateMessageOccupied() {
      document.getElementById('messageIcon').textContent = '!';
      document.getElementById('messageIcon').style.borderColor = '#ff4040';
      document.getElementById('messageIcon').style.color = '#ff4040';
      document.getElementById('messageText').innerHTML =
        '<span class="message-red">Interval ocupat</span><br>' +
        getIntervalText();
    }

    function updateMessageConfirmed() {
      document.getElementById('messageIcon').textContent = '✓';
      document.getElementById('messageIcon').style.borderColor = '#58d45f';
      document.getElementById('messageIcon').style.color = '#58d45f';
      document.getElementById('messageText').innerHTML =
        '<span class="message-green">Confirmat!</span><br>' +
        getIntervalText();
    }

    function updateMessageCustom(text) {
      document.getElementById('messageIcon').textContent = '!';
      document.getElementById('messageIcon').style.borderColor = '#ff4040';
      document.getElementById('messageIcon').style.color = '#ff4040';
      document.getElementById('messageText').innerHTML = text;
    }

    function setConfirmEnabled(enabled) {
      var btn = document.getElementById('confirmBtn');

      if (enabled) {
        btn.classList.remove('disabled');
      } else {
        btn.classList.add('disabled');
      }
    }

    async function confirmAppointment() {
      if (oraSelectataIndex === null) return;

      if (!intervalEsteLiber()) {
        speakText('Interval ocupat');
        return;
      }

      var btn = document.getElementById('confirmBtn');
      btn.classList.add('disabled');
      btn.querySelector('.confirm-title').textContent = 'SE SALVEAZĂ...';
      btn.querySelector('.confirm-sub').textContent = 'Asteapta cateva secunde';

      var payload = {
        client_id: clientId || null,
        nume: clientNume || "",
        telefon: clientTelefon || "",
        data: zile[ziSelectataIndex].dataIso,
        ora_start: sloturi[oraSelectataIndex],
        durata: durataSelectata,
        status: "PROGRAMATA",
        confirmare_trimisa: false,
        reminder_trimis: false,
        anulat: false,
        notite: ""
      };

      try {
        var res = await fetch(
          SUPABASE_URL + "/rest/v1/programari",
          {
            method: "POST",
            headers: {
              apikey: SUPABASE_KEY,
              Authorization: "Bearer " + SUPABASE_KEY,
              "Content-Type": "application/json",
              "Prefer": "return=representation"
            },
            body: JSON.stringify(payload)
          }
        );

        if (!res.ok) throw new Error("Nu pot salva programarea.");

        var salvata = await res.json();
        if (salvata && salvata[0]) {
          programari.push(salvata[0]);
        }

        confirmata = true;
        renderSlots();
        updateMessageConfirmed();

        btn.querySelector('.confirm-title').textContent = 'PROGRAMARE SALVATĂ';
        btn.querySelector('.confirm-sub').textContent = 'Apare in meniul Programari';

      } catch (err) {
        resetButton();
        setConfirmEnabled(true);
        updateMessageCustom("Nu pot salva programarea.");
        console.log(err);
      }
    }

    function resetButton() {
      var btn = document.getElementById('confirmBtn');
      btn.querySelector('.confirm-title').textContent = 'CONFIRMĂ CEREREA';
      btn.querySelector('.confirm-sub').textContent = 'Trimite cererea de programare';
    }

    function formatDateIso(d) {
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var zi = String(d.getDate()).padStart(2, '0');
      return y + '-' + m + '-' + zi;
    }

    function changeDuration() {
      window.top.location.href = "<?= scriptUrl ?>?page=programare_demo_pg2";
    }

    function goBack() {
      window.top.location.href = "<?= scriptUrl ?>?page=programare_demo_pg2";
    }

    init();
  </script>
</body>
</html>
