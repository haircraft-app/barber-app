<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Indisponibilitati</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #020202;
      color: #f2c94c;
    }

    .btn {
      flex:1;
      text-align:center;
      padding:12px;
      border:1px solid #f2c94c;
      color:#f2c94c;
      border-radius:8px;
      cursor:pointer;
    }

    .active {
      background:#f2c94c;
      color:#000;
    }
  </style>

</head>

<body>

  <!-- HEADER -->
  <div style="display:flex; align-items:center; padding:15px;">

    <div onclick="window.location.href='index_premium.html'" style="margin-right:15px; font-size:20px; cursor:pointer;">
      ←
    </div>

    <div style="font-size:22px; font-weight:700;">
      Indisponibilități
    </div>

  </div>

  <!-- TIP SELECTARE -->
  <div style="display:flex; gap:10px; padding:15px;">

    <div class="btn" onclick="selectType(this)">Interval</div>
    <div class="btn" onclick="selectType(this)">Zi întreagă</div>
    <div class="btn" onclick="selectType(this)">Concediu</div>

  </div>

  <!-- ZILE -->
  <div style="padding:15px;">
    Zile aici
  </div>

  <!-- ORE -->
  <div style="padding:15px;">
    Ore aici
  </div>

  <!-- MESAJ -->
  <div style="padding:15px;">
    Mesaj aici
  </div>

  <!-- BUTON -->
  <div style="padding:15px;">
    BLOCAZĂ
  </div>

<script>
function selectType(el){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
}
</script>

</body>
</html>
