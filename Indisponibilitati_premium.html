<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Indisponibilitati</title>

<style>
body {
  margin:0;
  font-family: Arial, sans-serif;
  background:#020202;
  color:#f2c94c;
}

.btn {
  flex:1;
  text-align:center;
  padding:12px;
  border:1px solid #f2c94c;
  color:#f2c94c;
  border-radius:8px;
  cursor:pointer;
}

.active {
  background:#f2c94c;
  color:#000;
}

.section {
  padding:15px;
}
</style>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script>
const supabase = window.supabase.createClient(
  'https://hnvqauxqxtdzgyqumkqa.supabase.co',
  'sb_publishable_k1pGTW92yAbLX3PKRQjFpQ_0AQBRker'
);

let selectedType = null;

function selectType(el,type){
  document.querySelectorAll('.btn').forEach(b=>b.classList.remove('active'));
  el.classList.add('active');
  selectedType = type;

  document.getElementById('oreSection').style.display = (type==='interval') ? 'block':'none';
  document.getElementById('concediuSection').style.display = (type==='concediu') ? 'block':'none';
}

async function saveData(){
  if(!selectedType){
    alert('Selecteaza tipul');
    return;
  }

  const data = {
    tip: selectedType,
    activa: true
  };

  const { error } = await supabase.from('indisponibilitati').insert([data]);

  if(error){
    alert('Eroare salvare');
    return;
  }

  alert('Salvat');
  window.location.href='index_premium.html';
}
</script>

</head>

<body>

<div style="display:flex; align-items:center; padding:15px;">
  <div onclick="window.location.href='index_premium.html'" style="margin-right:15px; font-size:20px; cursor:pointer;">←</div>
  <div style="font-size:22px; font-weight:700;">Indisponibilități</div>
</div>

<div style="display:flex; gap:10px; padding:15px;">
  <div class="btn" onclick="selectType(this,'interval')">Interval</div>
  <div class="btn" onclick="selectType(this,'zi')">Zi întreagă</div>
  <div class="btn" onclick="selectType(this,'concediu')">Concediu</div>
</div>

<div class="section">Zile aici</div>

<div id="oreSection" class="section">Ore aici</div>

<div id="concediuSection" class="section" style="display:none;">
Data început - Data final
</div>

<div class="section">Mesaj</div>

<div class="section">
  <div onclick="saveData()" style="background:#f2c94c; color:#000; text-align:center; padding:15px; border-radius:8px; cursor:pointer;">
    BLOCHEAZĂ
  </div>
</div>

</body>
</html>
