<!DOCTYPE html>
<html lang="ro">
<head>
  <!-- BLOC 1 - SETĂRI PAGINĂ -->
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Orar</title>

  <!-- BLOC 2 - STIL GENERAL -->
  <style>
    * {
      box-sizing: border-box;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
      overflow-x: hidden;
    }

    body {
      min-height: 100vh;
    }

    /* BLOC 3 - PAGINA */
    .page {
      min-height: 100vh;
      padding: 10px 8px 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    /* BLOC 4 - HEADER */
    .header {
      position: relative;
      min-height: 30px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .home-btn {
      position: absolute;
      left: 0;
      top: 0;
      height: 27px;
      padding: 0 7px;
      border-radius: 12px;
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 11px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .title {
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      color: #f2c94c;
      text-align: center;
    }

    .subtitle {
      font-size: 11px;
      color: rgba(255,255,255,0.75);
      text-align: center;
      margin-top: -6px;
    }

    /* BLOC 5 - TABEL ORAR */
    .orar-wrapper {
      width: 100%;
      overflow-x: auto;
      overflow-y: visible;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      background: rgba(12, 24, 38, 0.88);
      box-shadow: 0 10px 24px rgba(0,0,0,0.42);
    }

    .orar-grid {
      display: grid;
      grid-template-columns: 74px repeat(7, 76px);
      min-width: 606px;
    }

    .cell {
      min-height: 25px;
      padding: 3px 2px;
      border-right: 1px solid rgba(242,201,76,0.35);
      border-bottom: 1px solid rgba(242,201,76,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      font-size: 10px;
      font-weight: 900;
      color: #111;
      line-height: 1.05;
    }

    .hour-cell {
      position: sticky;
      left: 0;
      z-index: 3;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 9.5px;
      font-weight: 900;
    }

    .head-cell {
      position: sticky;
      top: 0;
      z-index: 2;
      min-height: 30px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 10px;
      font-weight: 900;
      flex-direction: column;
      gap: 2px;
    }

    .head-cell.hour-cell {
      z-index: 4;
    }

    .day-name {
      font-size: 11px;
      font-weight: 900;
      line-height: 1;
    }

    .day-date {
      font-size: 9px;
      font-weight: 900;
      line-height: 1;
    }

    .free {
      background: #D5F0C0;
      color: #000;
    }

    .busy {
      background: #FF6B6B;
      color: #000;
    }

    .legend {
      display: flex;
      gap: 8px;
      justify-content: center;
      align-items: center;
      font-size: 11px;
      font-weight: 900;
      color: #fff;
      margin-top: 1px;
    }

    .legend-item {
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .legend-box {
      width: 13px;
      height: 13px;
      border-radius: 4px;
      border: 1px solid rgba(255,255,255,0.35);
    }

    .legend-box.free-box {
      background: #D5F0C0;
    }

    .legend-box.busy-box {
      background: #FF6B6B;
    }
  </style>
</head>

<body>
  <!-- BLOC HTML 1 - PAGINA ORAR -->
  <div class="page">

    <!-- BLOC HTML 2 - HEADER -->
    <div class="header">
      <button class="home-btn" onclick="goHome()">⌂ HOME</button>
      <div class="title">Orar</div>
    </div>

    <div class="subtitle">Trage tabelul dreapta - stânga pentru toate cele 7 zile</div>

    <!-- BLOC HTML 3 - TABEL -->
    <div class="orar-wrapper">
      <div id="orarGrid" class="orar-grid"></div>
    </div>


  </div>

  <script>
    /* BLOC 6 - SETĂRI ORAR */
    const ORA_START = 8;
    const ORA_FINAL = 22;
    const DURATA_SLOT = 30;

    const ZILE_SCURT = ['Du', 'Lu', 'Ma', 'Mi', 'Jo', 'Vi', 'Sa'];
    const LUNI = ['ian', 'feb', 'mar', 'apr', 'mai', 'iun', 'iul', 'aug', 'sep', 'oct', 'nov', 'dec'];

    /* BLOC 7 - HOME */
    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* BLOC 8 - DATA ZILELOR */
    function getDateIso(offset) {
      const d = new Date();
      d.setDate(d.getDate() + offset);
      return new Date(d.getFullYear(), d.getMonth(), d.getDate()).toLocaleDateString('en-CA');
    }

    function getDays() {
      const zile = [];

      for (let i = 0; i < 7; i++) {
        const d = new Date();
        d.setDate(d.getDate() + i);

        zile.push({
          dataIso: getDateIso(i),
          ziScurt: ZILE_SCURT[d.getDay()],
          dataText: d.getDate() + ' ' + LUNI[d.getMonth()]
        });
      }

      return zile;
    }

    /* BLOC 9 - INTERVALE ORARE */
    function pad(num) {
      return String(num).padStart(2, '0');
    }

    function minuteToText(totalMinute) {
      const h = Math.floor(totalMinute / 60);
      const m = totalMinute % 60;
      return pad(h) + ':' + pad(m);
    }

    function getSlots() {
      const slots = [];
      const start = ORA_START * 60;
      const end = ORA_FINAL * 60;

      for (let t = start; t < end; t += DURATA_SLOT) {
        slots.push({
          startMinute: t,
          endMinute: t + DURATA_SLOT,
          text: minuteToText(t) + '-' + minuteToText(t + DURATA_SLOT)
        });
      }

      return slots;
    }

    /* BLOC 10 - CITIRE PROGRAMĂRI */
    function getProgramari() {
      try {
        return JSON.parse(localStorage.getItem('programari_lista') || '[]');
      } catch(e) {
        return [];
      }
    }

    function intervalToMinutes(interval) {
      if (!interval || interval.indexOf('-') === -1) return null;

      const parti = interval.split('-');
      const start = parti[0].trim().split(':');
      const end = parti[1].trim().split(':');

      if (start.length < 2 || end.length < 2) return null;

      return {
        startMinute: Number(start[0]) * 60 + Number(start[1]),
        endMinute: Number(end[0]) * 60 + Number(end[1])
      };
    }

    /* BLOC 11 - VERIFICARE OCUPAT / LIBER */
    function esteOcupat(dataIso, slot, programari) {
      return programari.some(function(p) {
        if (!p || !p.zi || !p.zi.dataIso || !p.interval) return false;
        if (p.zi.dataIso !== dataIso) return false;

        const interval = intervalToMinutes(p.interval);
        if (!interval) return false;

        return slot.startMinute < interval.endMinute && slot.endMinute > interval.startMinute;
      });
    }

    /* BLOC 12 - AFIȘARE TABEL */
    function renderOrar() {
      const grid = document.getElementById('orarGrid');
      const zile = getDays();
      const slots = getSlots();
      const programari = getProgramari();

      let html = '';

      html += '<div class="cell head-cell hour-cell">Ora</div>';

      zile.forEach(function(zi) {
        html += `
          <div class="cell head-cell">
            <div class="day-name">${zi.ziScurt}</div>
            <div class="day-date">${zi.dataText}</div>
          </div>
        `;
      });

      slots.forEach(function(slot) {
        html += `<div class="cell hour-cell">${slot.text}</div>`;

        zile.forEach(function(zi) {
          const ocupat = esteOcupat(zi.dataIso, slot, programari);
          html += `<div class="cell ${ocupat ? 'busy' : 'free'}">${ocupat ? 'Ocupat' : 'Liber'}</div>`;
        });
      });

      grid.innerHTML = html;
    }

    renderOrar();
  </script>
</body>
</html>
