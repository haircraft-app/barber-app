<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #f5d37a;
    }

    .page {
      min-height: 100vh;
      padding: 30px;
      display: flex;
      flex-direction: column;
    }

    .header {
      text-align: center;
      margin-bottom: 35px;
    }

    .title {
      font-size: 30px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 42px;
      font-weight: bold;
      color: #f2c94c;
      letter-spacing: 3px;
    }

    .steps {
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 30px 0;
    }

    .step {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 3px solid #d4af37;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      font-weight: bold;
    }

    .step.active {
      background: #f2c94c;
      color: #000;
    }

    .line {
      width: 45px;
      height: 3px;
      background: #d4af37;
    }

    .card {
      border: 2px solid rgba(212,175,55,0.9);
      border-radius: 26px;
      background: linear-gradient(145deg, #202020, #060606);
      padding: 28px;
      margin-bottom: 22px;
    }

    .label {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
      margin-bottom: 16px;
    }

    .input {
      width: 100%;
      height: 95px;
      border-radius: 20px;
      border: 1px solid rgba(212,175,55,0.6);
      background: #080808;
      color: white;
      font-size: 34px;
      padding: 0 20px;
      outline: none;
    }

    .results {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 22px;
    }

    .result-card {
      border: 2px solid rgba(212,175,55,0.85);
      border-radius: 22px;
      background: linear-gradient(145deg, #1d1d1d, #070707);
      padding: 18px 22px;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
    }

    .result-name {
      font-size: 34px;
      font-weight: 900;
    }

    .result-phone {
      font-size: 26px;
      color: #f2c94c;
      font-weight: 900;
      white-space: nowrap;
    }

    .selected {
      text-align: center;
      background: linear-gradient(145deg, #3a2a08, #090909);
      border: 3px solid #f2c94c;
      border-radius: 26px;
      padding: 30px;
      box-shadow: 0 0 26px rgba(242,201,76,0.35);
    }

    .selected-title {
      font-size: 30px;
      font-weight: 900;
      letter-spacing: 3px;
      color: #f2c94c;
      margin-bottom: 18px;
    }

    .selected-name {
      font-size: 52px;
      font-weight: 900;
      color: white;
    }

    .selected-phone {
      font-size: 42px;
      font-weight: 900;
      color: #f2c94c;
      margin-top: 10px;
    }

    .btn {
      margin-top: auto;
      height: 110px;
      border-radius: 24px;
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 36px;
      font-weight: bold;
      cursor: pointer;
    }

    .btn:disabled {
      opacity: 0.45;
      cursor: not-allowed;
    }

    .info-message {
      font-size: 28px;
      color: #e0d8c6;
      font-weight: 800;
      text-align: center;
      padding: 20px;
    }
    .back {
     position: absolute;
     left: 10px;
     top: 150px;
     font-size: 25px;
     font-weight: bold;
     color: #f2c94c;
     cursor: pointer;
}

  </style>
</head>

<body>

<div class="page">
  <div class="back" onclick="window.location.href='<?= scriptUrl ?>'">
  ← MENIU PRINCIPAL
</div>

  <div class="header">
    <div class="title">Programare noua</div>
    <div class="subtitle">DATE CLIENT</div>
  </div>

  <div class="steps">
    <div class="step active">1</div>
    <div class="line"></div>
    <div class="step">2</div>
    <div class="line"></div>
    <div class="step">3</div>
    <div class="line"></div>
    <div class="step">4</div>
  </div>

  <div class="card">
    <div class="label">Cauta client</div>
    <input id="clientSearch" class="input" placeholder="Ex: Miha" oninput="searchClients()">
  </div>

  <div id="results" class="results"></div>

  <div class="card">
    <div class="label">Client selectat</div>

    <div class="selected">
      <div class="selected-title">CLIENT SELECTAT</div>
      <div class="selected-name">-</div>
      <div class="selected-phone">-</div>
    </div>
  </div>

  <button id="nextBtn" class="btn" disabled onclick="nextStep()">Urmatorul pas ›</button>

</div>

<script>
  const SUPABASE_URL = "https://hnvqauxqxtdzgyqumkqa.supabase.co";
  const SUPABASE_KEY = "sb_publishable_k1pGTW92yAbLX3PKRQjFpQ_0AQBRker";

  let clienti = [];
  let clientSelectat = null;

  async function loadClienti() {
    const box = document.getElementById("results");
    box.innerHTML = '<div class="info-message">Se incarca clientii...</div>';

    try {
      const res = await fetch(
        SUPABASE_URL + "/rest/v1/clienti?select=id,nume,telefon,email,data_nastere,notite&order=nume.asc",
        {
          headers: {
            apikey: SUPABASE_KEY,
            Authorization: "Bearer " + SUPABASE_KEY
          }
        }
      );

      if (!res.ok) {
        throw new Error("Eroare Supabase: " + res.status);
      }

      clienti = await res.json();
      box.innerHTML = "";

    } catch (err) {
      box.innerHTML = '<div class="info-message">Nu pot incarca clientii din Supabase.</div>';
      console.log(err);
    }
  }

  function searchClients() {
    const text = document.getElementById("clientSearch").value.toLowerCase().trim();
    const box = document.getElementById("results");
    box.innerHTML = "";

    if (text.length < 2) return;

    const gasiti = clienti.filter(function(c) {
      const nume = String(c.nume || "").toLowerCase();
      const telefon = String(c.telefon || "").toLowerCase();

      return nume.includes(text) || telefon.includes(text);
    });

    if (gasiti.length === 0) {
      box.innerHTML = '<div class="info-message">Nu exista client gasit.</div>';
      return;
    }

    gasiti.forEach(function(client) {
      const div = document.createElement("div");
      div.className = "result-card";
      div.onclick = function() {
        selectClient(client);
      };

      div.innerHTML =
        '<div class="result-name">' + escapeHtml(client.nume || "") + '</div>' +
        '<div class="result-phone">' + escapeHtml(client.telefon || "") + '</div>';

      box.appendChild(div);
    });
  }

  function selectClient(client) {
    clientSelectat = client;

    document.querySelector(".selected-name").innerText = client.nume || "-";
    document.querySelector(".selected-phone").innerText = client.telefon || "-";
    document.getElementById("nextBtn").disabled = false;

    // speak(client.nume || "");
  }

  function nextStep() {
    if (!clientSelectat) {
      alert("Alege un client.");
      return;
    }

    localStorage.setItem("client_id", clientSelectat.id || "");
    localStorage.setItem("client_nume", clientSelectat.nume || "");
    localStorage.setItem("client_telefon", clientSelectat.telefon || "");

    window.top.location.href = "<?= scriptUrl ?>?page=programare_demo_pg2&_nav=1";
  }

  function speak(text) {
    try {
      const msg = new SpeechSynthesisUtterance(text);
      msg.lang = "ro-RO";
      speechSynthesis.cancel();
      speechSynthesis.speak(msg);
    } catch(e) {}
  }

  function escapeHtml(text) {
    return String(text || "")
      .replaceAll("&", "&amp;")
      .replaceAll("<", "&lt;")
      .replaceAll(">", "&gt;")
      .replaceAll('"', "&quot;")
      .replaceAll("'", "&#039;");
  }

  loadClienti();
</script>

</body>
</html>
