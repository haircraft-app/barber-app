<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    /* ===== SETARI GENERALE PAGINA ===== */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ===== HEADER PAGINA ===== */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 4px;
      padding-top: 2px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 2px;
      color: #f2c94c;
      font-size: 13px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 4px;
    }

    .back-arrow {
      font-size: 20px;
      line-height: 1;
    }

    .add-btn {
      position: absolute;
      right: 0;
      top: -4px;
      color: #f2c94c;
      font-size: 34px;
      font-weight: 300;
      cursor: pointer;
      line-height: 1;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 20px;
      color: white;
    }

    /* ===== ECRANE INTERNE ===== */
    .screen {
      display: none;
      flex-direction: column;
      gap: 10px;
    }

    .screen.active {
      display: flex;
    }

    /* ===== CAUTARE CLIENT ===== */
    .search-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 8px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-icon {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 50%;
      border: 1px solid #f2c94c;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f2c94c;
      font-size: 15px;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 15px;
      font-weight: 800;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    /* ===== LISTA CLIENTI ===== */
    .client-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .client-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 6px 7px 6px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .client-text {
      flex: 1;
      min-width: 0;
    }

    .client-name {
      font-size: 14px;
      font-weight: normal;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-details {
      margin-top: 2px;
      font-size: 11px;
      font-weight: normal;
      color: #f2c94c;
      text-align: left;
    }

    .arrow {
      color: #f2c94c;
      font-size: 22px;
      font-weight: 300;
      line-height: 1;
    }

    .empty-card {
      border-radius: 16px;
      padding: 14px;
      background: rgba(12, 24, 38, 0.72);
      text-align: center;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
    }

    /* ===== DETALII CLIENT ===== */
    .detail-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 12px;
      background: rgba(12, 24, 38, 0.88);
      text-align: center;
    }

    .detail-name {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      margin-bottom: 8px;
      word-break: break-word;
    }

    .detail-info {
      font-size: 14px;
      color: #f2c94c;
      margin-top: 5px;
      word-break: break-word;
    }

    .detail-note {
      margin-top: 10px;
      font-size: 13px;
      color: rgba(255,255,255,0.78);
      word-break: break-word;
    }

    .action-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .action-btn {
      width: 100%;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 11px 12px;
      background: rgba(12, 24, 38, 0.88);
      color: #fff;
      font-size: 15px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
    }

    .action-btn.gold {
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      text-align: center;
    }

    .action-btn.danger {
      color: #ff4040;
      border-color: rgba(255,64,64,0.75);
      background: rgba(255,64,64,0.06);
      text-align: center;
    }

    /* ===== FORMULAR CLIENT ===== */
    .form-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 10px;
      background: rgba(12, 24, 38, 0.88);
    }

    .form-title {
      color: #f2c94c;
      font-size: 16px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    .field-label {
      color: rgba(255,255,255,0.78);
      font-size: 13px;
      font-weight: 900;
      margin: 10px 0 4px;
    }

    .field {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      background: rgba(5, 12, 20, 0.82);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      padding: 10px 9px;
      outline: none;
    }

    textarea.field {
      min-height: 80px;
      resize: none;
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 12px 10px;
      margin-top: 12px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    .delete-btn {
      width: 100%;
      border: 1px solid rgba(255,64,64,0.75);
      border-radius: 14px;
      padding: 11px 10px;
      margin-top: 8px;
      background: rgba(255,64,64,0.06);
      color: #ff4040;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    /* ===== BARA JOS HOME ===== */
    .bottom-bar {
      margin-top: auto;
      display: flex;
    }

    .box-btn {
      flex: 1;
      height: 45px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ===== HEADER ===== -->
    <div class="header">
      <div class="back-btn" onclick="goBack()">
        <span class="back-arrow">←</span>
        <span>ÎNAPOI</span>
      </div>

      <div class="add-btn" onclick="openAdd()">+</div>

      <div class="title">Clienți - <span id="totalClienti">0</span></div>
      <div class="subtitle">Lista clienți</div>
    </div>

    <!-- ===== ECRAN LISTA CLIENTI ===== -->
    <div id="screenList" class="screen active">
      <div class="search-card">
        <div class="search-icon">⌕</div>
        <input id="searchInput" class="search-input" placeholder="Caută client..." oninput="renderClients()">
      </div>

      <div id="clientList" class="client-list"></div>
    </div>

    <!-- ===== ECRAN DETALII CLIENT ===== -->
    <div id="screenDetails" class="screen">
      <div class="detail-card">
        <div class="detail-name" id="detailName"></div>
        <div class="detail-info" id="detailPhone"></div>
        <div class="detail-info" id="detailEmail"></div>
        <div class="detail-info" id="detailBirthday"></div>
        <div class="detail-info" id="detailNrProgramari"></div>
        <div class="detail-note" id="detailNotes"></div>
      </div>

      <div class="action-list">
        <button class="action-btn gold" onclick="openEdit()">EDITEAZĂ CLIENT</button>
        <button class="action-btn" onclick="programClient()">Programează</button>
        <button class="action-btn" onclick="clientHistory()">Istoric programări</button>
        <button class="action-btn danger" onclick="deleteCurrentClient()">ȘTERGE CLIENT</button>
      </div>
    </div>

    <!-- ===== ECRAN FORMULAR CLIENT ===== -->
    <div id="screenForm" class="screen">
      <div class="form-card">
        <div class="form-title" id="formTitle">Adaugă client</div>

        <div class="field-label">Nume complet</div>
        <input id="formName" class="field" type="text" placeholder="Nume client">

        <div class="field-label">Telefon</div>
        <input id="formPhone" class="field" type="tel" placeholder="Telefon">

        <div class="field-label">Email</div>
        <input id="formEmail" class="field" type="email" placeholder="Email">

        <div class="field-label">Data naștere</div>
        <input id="formBirthday" class="field" type="date">

        <div class="field-label">Notițe</div>
        <textarea id="formNotes" class="field" placeholder="Observații client..."></textarea>

        <div class="field-label">Număr programări</div>
        <input id="formNrProgramari" class="field" type="number" min="0" value="0">

        <button class="save-btn" onclick="saveClient()">SALVEAZĂ CLIENT</button>
        <button id="formDeleteBtn" class="delete-btn" onclick="deleteCurrentClient()">ȘTERGE CLIENT</button>
      </div>
    </div>

    <!-- ===== BUTON HOME JOS ===== -->
    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

    var clients = [];
    var currentClientId = null;
    var formMode = "add";

    function loadClients() {
      clients = JSON.parse(localStorage.getItem('clienti_lista') || '[]');

      if (!clients.length) {
        clients = CLIENTI_IMPORTATI;
        saveClientsToStorage();
      }

      actualizeazaNumarProgramari();
      renderClients();
    }

    function saveClientsToStorage() {
      localStorage.setItem('clienti_lista', JSON.stringify(clients));
    }

    /* ===== ACTUALIZARE NUMAR PROGRAMARI DIN PROGRAMARI_LISTA ===== */
    function curataTelefon(telefon) {
      return String(telefon || '').replace(/[^0-9]/g, '');
    }

    function actualizeazaNumarProgramari() {
      var programari = JSON.parse(localStorage.getItem('programari_lista') || '[]');

      clients.forEach(function(client) {
        var telClient = curataTelefon(client.telefon);
        var numeClient = String(client.nume || '').toLowerCase().trim();

        client.nr_programari = programari.filter(function(p) {
          var telProgramare = curataTelefon(p.client && p.client.telefon);
          var numeProgramare = String(p.client && p.client.nume || '').toLowerCase().trim();

          return (telClient && telProgramare && telClient === telProgramare) ||
                 (numeClient && numeProgramare && numeClient === numeProgramare);
        }).length;
      });

      saveClientsToStorage();
    }

    /* ===== AFISARE ECRANE ===== */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(screen) {
        screen.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
    }

    /* ===== AFISARE LISTA CLIENTI ===== */
    function renderClients() {
      document.getElementById('totalClienti').innerText = clients.length;

      var box = document.getElementById('clientList');
      var q = document.getElementById('searchInput').value.toLowerCase().trim();

      var filtered = clients
        .filter(function(c) {
          return String(c.nume || '').toLowerCase().indexOf(q) !== -1 ||
                 String(c.telefon || '').toLowerCase().indexOf(q) !== -1;
        })
        .sort(function(a, b) {
          return String(a.nume || '').localeCompare(String(b.nume || ''));
        });

      if (!filtered.length) {
        box.innerHTML = '<div class="empty-card">Nu există clienți.</div>';
        return;
      }

      box.innerHTML = filtered.map(function(c) {
        return `
          <div class="client-card" onclick="openDetails('${c.id}')">
            <div class="client-text">
              <div class="client-name">${escapeHtml(c.nume)}</div>
              <div class="client-details">${escapeHtml(c.telefon)} · Programări: ${Number(c.nr_programari || 0)}</div>
            </div>
            <div class="arrow">›</div>
          </div>
        `;
      }).join('');
    }

    /* ===== DETALII CLIENT ===== */
    function openDetails(id) {
      currentClientId = id;

      var c = clients.find(function(x) {
        return String(x.id) === String(id);
      });

      if (!c) return;

      document.getElementById('detailName').textContent = c.nume || '-';
      document.getElementById('detailPhone').textContent = c.telefon ? 'Telefon: ' + c.telefon : 'Telefon: -';
      document.getElementById('detailEmail').textContent = c.email ? 'Email: ' + c.email : 'Email: -';
      document.getElementById('detailBirthday').textContent = c.data_nastere ? 'Data naștere: ' + c.data_nastere : 'Data naștere: -';
      document.getElementById('detailNrProgramari').textContent = 'Programări: ' + Number(c.nr_programari || 0);
      document.getElementById('detailNotes').textContent = c.notite ? c.notite : '';

      showScreen('screenDetails');
    }

    /* ===== ADAUGARE CLIENT ===== */
    function openAdd() {
      formMode = 'add';
      currentClientId = null;

      document.getElementById('formTitle').textContent = 'Adaugă client';
      document.getElementById('formName').value = '';
      document.getElementById('formPhone').value = '';
      document.getElementById('formEmail').value = '';
      document.getElementById('formBirthday').value = '';
      document.getElementById('formNotes').value = '';
      document.getElementById('formNrProgramari').value = 0;
      document.getElementById('formDeleteBtn').style.display = 'none';

      showScreen('screenForm');
    }

    /* ===== EDITARE CLIENT ===== */
    function openEdit() {
      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c) return;

      formMode = 'edit';

      document.getElementById('formTitle').textContent = 'Editează client';
      document.getElementById('formName').value = c.nume || '';
      document.getElementById('formPhone').value = c.telefon || '';
      document.getElementById('formEmail').value = c.email || '';
      document.getElementById('formBirthday').value = c.data_nastere || '';
      document.getElementById('formNotes').value = c.notite || '';
      document.getElementById('formNrProgramari').value = Number(c.nr_programari || 0);
      document.getElementById('formDeleteBtn').style.display = 'block';

      showScreen('screenForm');
    }

    /* ===== SALVARE CLIENT ===== */
    function saveClient() {
      var nume = document.getElementById('formName').value.trim();
      var telefon = document.getElementById('formPhone').value.trim();
      var email = document.getElementById('formEmail').value.trim();
      var dataNastere = document.getElementById('formBirthday').value;
      var notite = document.getElementById('formNotes').value.trim();
      var nrProgramari = Number(document.getElementById('formNrProgramari').value || 0);

      if (!nume) {
        alert('Completează numele clientului.');
        return;
      }

      if (!telefon) {
        alert('Completează telefonul clientului.');
        return;
      }

      if (formMode === 'add') {
        var newClient = {
          id: String(Date.now()),
          nume: nume,
          telefon: telefon,
          email: email,
          data_nastere: dataNastere,
          notite: notite,
          nr_programari: nrProgramari
        };

        clients.push(newClient);
        currentClientId = newClient.id;
      } else {
        var index = clients.findIndex(function(x) {
          return String(x.id) === String(currentClientId);
        });

        if (index === -1) return;

        clients[index].nume = nume;
        clients[index].telefon = telefon;
        clients[index].email = email;
        clients[index].data_nastere = dataNastere;
        clients[index].notite = notite;
        clients[index].nr_programari = nrProgramari;
      }

      saveClientsToStorage();
      renderClients();
      openDetails(currentClientId);
    }

    /* ===== STERGERE CLIENT ===== */
    function deleteCurrentClient() {
      if (!currentClientId) return;

      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c) return;

      if (!confirm('Ștergi clientul ' + c.nume + '?')) return;

      clients = clients.filter(function(x) {
        return String(x.id) !== String(currentClientId);
      });

      currentClientId = null;
      saveClientsToStorage();
      renderClients();
      showScreen('screenList');
    }

      alert('Istoricul va fi legat separat de programări.');
    }

    /* ===== NAVIGARE ===== */
    function goBack() {
      var detailsActive = document.getElementById('screenDetails').classList.contains('active');
      var formActive = document.getElementById('screenForm').classList.contains('active');

      if (detailsActive) {
        showScreen('screenList');
        return;
      }

      if (formActive) {
        if (formMode === 'edit' && currentClientId) {
          openDetails(currentClientId);
        } else {
          showScreen('screenList');
        }
        return;
      }

      goHome();
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* ===== PROTECTIE TEXT ===== */
    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    /* ===== PORNIRE PAGINA ===== */
    loadClients();
  </script>
</body>
</html>
