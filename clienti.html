<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">

  <style>
    /* ===== RESET GENERAL ===== */
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      min-height: 100%;
      font-family: Arial, sans-serif;
      background:
        radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
        linear-gradient(180deg, #080808 0%, #000 100%);
      color: #fff;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ===== PAGINA ===== */
    .page {
      min-height: 100vh;
      padding: 12px 10px 10px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    /* ===== HEADER ===== */
    .header {
      position: relative;
      text-align: center;
      margin-bottom: 4px;
      min-height: 58px;
      padding-top: 2px;
    }

    .back-btn {
      position: absolute;
      left: 0;
      top: 0;
      height: 34px;
      padding: 0 9px;
      border: 1px solid rgba(242,201,76,0.75);
      border-radius: 11px;
      background: rgba(12, 24, 38, 0.78);
      color: #f2c94c;
      font-size: 12px;
      font-weight: 900;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 4px;
    }

    .add-btn {
      position: absolute;
      right: 0;
      top: 0;
      width: 34px;
      height: 34px;
      border-radius: 11px;
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 25px;
      font-weight: 900;
      line-height: 1;
      cursor: pointer;
    }

    .title {
      font-size: 28px;
      font-weight: 900;
      color: #f2c94c;
      line-height: 1.1;
      padding: 0 44px;
    }

    .subtitle {
      margin-top: 6px;
      font-size: 20px;
      color: white;
    }

    /* ===== ECRANE ===== */
    .screen {
      display: none;
      flex-direction: column;
      gap: 8px;
    }

    .screen.active {
      display: flex;
    }

    /* ===== CAUTARE ===== */
    .search-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 8px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .search-icon {
      width: 28px;
      height: 28px;
      min-width: 28px;
      border-radius: 9px;
      background: #050505;
      border: 1px solid #f2c94c;
      color: #f2c94c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
    }

    .search-input {
      width: 100%;
      border: none;
      outline: none;
      background: transparent;
      color: #fff;
      font-size: 16px;
      font-weight: 800;
    }

    .search-input::placeholder {
      color: rgba(255,255,255,0.55);
    }

    /* ===== LISTA CLIENTI ===== */
    .client-list {
      display: flex;
      flex-direction: column;
      gap: 5px;
    }

    .client-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 7px 8px 7px 10px;
      background: rgba(12, 24, 38, 0.88);
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
      cursor: pointer;
    }

    .client-icon {
      width: 30px;
      height: 30px;
      min-width: 30px;
      border-radius: 10px;
      background: #050505;
      border: 1px solid #f2c94c;
      color: #f2c94c;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 15px;
      font-weight: 900;
    }

    .client-text {
      flex: 1;
      min-width: 0;
    }

    .client-name {
      font-size: 14px;
      font-weight: normal;
      color: #fff;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .client-phone {
      margin-top: 2px;
      font-size: 11px;
      font-weight: normal;
      color: #f2c94c;
      text-align: left;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .arrow {
      color: #f2c94c;
      font-size: 24px;
      line-height: 1;
      flex-shrink: 0;
    }

    /* ===== DETALII CLIENT ===== */
    .detail-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 14px 10px;
      background: rgba(12, 24, 38, 0.88);
      text-align: center;
    }

    .detail-icon {
      width: 58px;
      height: 58px;
      border-radius: 18px;
      background: #050505;
      border: 1px solid #f2c94c;
      color: #f2c94c;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 9px;
      font-size: 28px;
      font-weight: 900;
    }

    .detail-name {
      font-size: 22px;
      font-weight: 900;
      color: #fff;
      line-height: 1.15;
      word-break: break-word;
    }

    .detail-info {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 800;
      color: #f2c94c;
      word-break: break-word;
    }

    /* ===== BUTOANE ACTIUNI ===== */
    .action-list {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .action-btn {
      width: 100%;
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 12px 12px;
      background: rgba(12, 24, 38, 0.88);
      color: #fff;
      font-size: 16px;
      font-weight: 900;
      text-align: left;
      cursor: pointer;
    }

    .action-btn.gold {
      border: none;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      text-align: center;
    }

    .action-btn.danger {
      color: #ff4040;
      border-color: rgba(255,64,64,0.70);
      background: rgba(255,64,64,0.06);
      text-align: center;
    }

    /* ===== FORMULAR ===== */
    .form-card {
      border: 1px solid #f2c94c;
      border-radius: 14px;
      padding: 10px;
      background: rgba(12, 24, 38, 0.88);
    }

    .form-title {
      color: #f2c94c;
      font-size: 17px;
      font-weight: 900;
      text-transform: uppercase;
      margin-bottom: 8px;
      text-align: center;
    }

    .field-label {
      color: rgba(255,255,255,0.78);
      font-size: 13px;
      font-weight: 900;
      margin: 10px 0 5px;
    }

    .field {
      width: 100%;
      border: 1px solid rgba(255,255,255,0.18);
      border-radius: 12px;
      background: rgba(5, 12, 20, 0.82);
      color: #fff;
      font-size: 15px;
      font-weight: 800;
      padding: 11px 10px;
      outline: none;
    }

    textarea.field {
      min-height: 78px;
      resize: none;
    }

    .save-btn {
      width: 100%;
      border: none;
      border-radius: 14px;
      padding: 13px 12px;
      margin-top: 12px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #111;
      font-size: 16px;
      font-weight: 900;
      cursor: pointer;
    }

    .delete-btn {
      width: 100%;
      border: 1px solid rgba(255,64,64,0.70);
      border-radius: 14px;
      padding: 12px 12px;
      margin-top: 8px;
      background: rgba(255,64,64,0.06);
      color: #ff4040;
      font-size: 15px;
      font-weight: 900;
      cursor: pointer;
    }

    /* ===== MESAJ GOL ===== */
    .empty-card {
      border-radius: 16px;
      padding: 14px;
      background: rgba(12, 24, 38, 0.72);
      text-align: center;
      color: rgba(255,255,255,0.78);
      font-size: 14px;
      font-weight: 900;
    }

    /* ===== BARA JOS ===== */
    .bottom-bar {
      margin-top: auto;
      display: flex;
    }

    .box-btn {
      flex: 1;
      height: 45px;
      border-radius: 14px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 20px;
      font-weight: 900;
      color: #111;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <div class="page">

    <!-- ===== HEADER ===== -->
    <div class="header">
      <button class="back-btn" onclick="goBack()">← BACK</button>
      <button class="add-btn" onclick="openAdd()">+</button>
      <div class="title">Clienți - <span id="totalClienti">0</span></div>
      <div class="subtitle">Lista clienți</div>
    </div>

    <!-- ===== LISTA CLIENTI ===== -->
    <div id="screenList" class="screen active">
      <div class="search-card">
        <div class="search-icon">⌕</div>
        <input id="searchInput" class="search-input" placeholder="Caută client..." oninput="renderClients()">
      </div>

      <div id="clientList" class="client-list"></div>
    </div>

    <!-- ===== DETALII CLIENT ===== -->
    <div id="screenDetails" class="screen">
      <div class="detail-card">
        <div class="detail-icon">👤</div>
        <div class="detail-name" id="detailName"></div>
        <div class="detail-info" id="detailPhone"></div>
        <div class="detail-info" id="detailEmail"></div>
        <div class="detail-info" id="detailBirthday"></div>
        <div class="detail-info" id="detailNotes"></div>
      </div>

      <div class="action-list">
        <button class="action-btn gold" onclick="openEdit()">EDITEAZĂ CLIENT</button>
        <button class="action-btn" onclick="programClient()">Programează</button>
        <button class="action-btn" onclick="clientHistory()">Istoric programări</button>
        <button class="action-btn danger" onclick="deleteCurrentClient()">ȘTERGE CLIENT</button>
      </div>
    </div>

    <!-- ===== FORMULAR CLIENT ===== -->
    <div id="screenForm" class="screen">
      <div class="form-card">
        <div class="form-title" id="formTitle">Adaugă client</div>

        <div class="field-label">Nume complet</div>
        <input id="formName" class="field" type="text" placeholder="Nume client">

        <div class="field-label">Telefon</div>
        <input id="formPhone" class="field" type="tel" placeholder="Telefon">

        <div class="field-label">Email opțional</div>
        <input id="formEmail" class="field" type="email" placeholder="Email">

        <div class="field-label">Data naștere</div>
        <input id="formBirthday" class="field" type="date">

        <div class="field-label">Notițe</div>
        <textarea id="formNotes" class="field" placeholder="Observații client..."></textarea>

        <button class="save-btn" onclick="saveClient()">SALVEAZĂ CLIENT</button>
        <button id="formDeleteBtn" class="delete-btn" onclick="deleteCurrentClient()">ȘTERGE CLIENT</button>
      </div>
    </div>

    <!-- ===== HOME JOS ===== -->
    <div class="bottom-bar">
      <div class="box-btn" onclick="goHome()">⌂ HOME</div>
    </div>

  </div>

  <script>
    /* ===== DATE LOCALSTORAGE ===== */
    const CLIENTI_KEY = 'clienti_lista';
    var clients = [];
    var currentClientId = null;
    var formMode = 'add';

    function loadClients() {
      clients = JSON.parse(localStorage.getItem(CLIENTI_KEY) || '[]');

      if (!Array.isArray(clients)) {
        clients = [];
      }

      renderClients();
    }

    function saveClientsToStorage() {
      localStorage.setItem(CLIENTI_KEY, JSON.stringify(clients));
    }

    /* ===== AFISARE ECRANE ===== */
    function showScreen(id) {
      document.querySelectorAll('.screen').forEach(function(s) {
        s.classList.remove('active');
      });

      document.getElementById(id).classList.add('active');
    }

    /* ===== AFISARE LISTA CLIENTI ===== */
    function renderClients() {
      document.getElementById('totalClienti').innerText = clients.length;
      var box = document.getElementById('clientList');
      var q = document.getElementById('searchInput').value.toLowerCase().trim();

      var filtered = clients
        .filter(function(c) {
          return String(c.nume || '').toLowerCase().indexOf(q) !== -1 ||
                 String(c.telefon || '').toLowerCase().indexOf(q) !== -1;
        })
        .sort(function(a, b) {
          return String(a.nume || '').localeCompare(String(b.nume || ''));
        });

      if (!filtered.length) {
        box.innerHTML = '<div class="empty-card">Nu există clienți găsiți.</div>';
        return;
      }

      box.innerHTML = filtered.map(function(c) {
        return `
          <div class="client-card" onclick="openDetails('${c.id}')">
            <div class="client-icon">👤</div>
            <div class="client-text">
              <div class="client-name">${escapeHtml(c.nume)}</div>
              <div class="client-phone">${escapeHtml(c.telefon)}</div>
            </div>
            <div class="arrow">›</div>
          </div>
        `;
      }).join('');
    }

    /* ===== DETALII CLIENT ===== */
    function openDetails(id) {
      currentClientId = id;

      var c = clients.find(function(x) {
        return String(x.id) === String(id);
      });

      if (!c) return;

      document.getElementById('detailName').textContent = c.nume || '-';
      document.getElementById('detailPhone').textContent = c.telefon || 'Fără telefon';
      document.getElementById('detailEmail').textContent = c.email ? c.email : 'Fără email';
      document.getElementById('detailBirthday').textContent = c.data_nastere ? c.data_nastere : 'Fără data nașterii';
      document.getElementById('detailNotes').textContent = c.notite ? c.notite : '';

      showScreen('screenDetails');
    }

    /* ===== ADAUGARE CLIENT ===== */
    function openAdd() {
      formMode = 'add';
      currentClientId = null;

      document.getElementById('formTitle').textContent = 'Adaugă client';
      document.getElementById('formName').value = '';
      document.getElementById('formPhone').value = '';
      document.getElementById('formEmail').value = '';
      document.getElementById('formBirthday').value = '';
      document.getElementById('formNotes').value = '';
      document.getElementById('formDeleteBtn').style.display = 'none';

      showScreen('screenForm');
    }

    /* ===== EDITARE CLIENT ===== */
    function openEdit() {
      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c) return;

      formMode = 'edit';

      document.getElementById('formTitle').textContent = 'Editează client';
      document.getElementById('formName').value = c.nume || '';
      document.getElementById('formPhone').value = c.telefon || '';
      document.getElementById('formEmail').value = c.email || '';
      document.getElementById('formBirthday').value = c.data_nastere || '';
      document.getElementById('formNotes').value = c.notite || '';
      document.getElementById('formDeleteBtn').style.display = 'block';

      showScreen('screenForm');
    }

    /* ===== SALVARE CLIENT ===== */
    function saveClient() {
      var name = document.getElementById('formName').value.trim();
      var phone = document.getElementById('formPhone').value.trim();
      var email = document.getElementById('formEmail').value.trim();
      var birthday = document.getElementById('formBirthday').value;
      var notes = document.getElementById('formNotes').value.trim();

      if (!name) {
        alert('Completează numele clientului.');
        return;
      }

      if (!phone) {
        alert('Completează telefonul clientului.');
        return;
      }

      if (formMode === 'add') {
        currentClientId = 'client_' + Date.now();

        clients.push({
          id: currentClientId,
          nume: name,
          telefon: phone,
          email: email,
          data_nastere: birthday,
          notite: notes
        });
      } else {
        clients = clients.map(function(c) {
          if (String(c.id) !== String(currentClientId)) return c;

          return {
            id: c.id,
            nume: name,
            telefon: phone,
            email: email,
            data_nastere: birthday,
            notite: notes
          };
        });
      }

      saveClientsToStorage();
      renderClients();
      openDetails(currentClientId);
    }

    /* ===== STERGERE CLIENT ===== */
    function deleteCurrentClient() {
      if (!currentClientId) return;

      var c = clients.find(function(x) {
        return String(x.id) === String(currentClientId);
      });

      if (!c) return;

      if (!confirm('Ștergi clientul ' + c.nume + '?')) return;

      clients = clients.filter(function(x) {
        return String(x.id) !== String(currentClientId);
      });

      currentClientId = null;
      saveClientsToStorage();
      renderClients();
      showScreen('screenList');
    }

    /* ===== ACTIUNI VIITOARE ===== */
    function programClient() {
      alert('Aici se va lega cu pagina Programare.');
    }

    function clientHistory() {
      alert('Aici se va afișa istoricul programărilor.');
    }

    /* ===== NAVIGARE ===== */
    function goBack() {
      var detailsActive = document.getElementById('screenDetails').classList.contains('active');
      var formActive = document.getElementById('screenForm').classList.contains('active');

      if (detailsActive) {
        showScreen('screenList');
        return;
      }

      if (formActive) {
        if (formMode === 'edit' && currentClientId) {
          openDetails(currentClientId);
        } else {
          showScreen('screenList');
        }
        return;
      }

      window.location.href = 'index_premium.html';
    }

    function goHome() {
      window.location.href = 'index_premium.html';
    }

    /* ===== TEXT SIGUR IN HTML ===== */
    function escapeHtml(text) {
      return String(text || '')
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;')
        .replaceAll('"', '&quot;')
        .replaceAll("'", '&#039;');
    }

    loadClients();
  </script>
</body>
</html>
