<!DOCTYPE html>
<html>
<head>
  <base target="_top">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
     margin: 0;
     padding: 0;
     width: 100%;
     min-height: 100%;
     font-family: Arial, sans-serif;
     background:
       radial-gradient(circle at top center, rgba(170,120,20,0.75) 0%, rgba(40,28,8,0.95) 30%, #030303 72%),
       linear-gradient(180deg, #080808 0%, #000 100%);
     color: #f5d37a;
    }

    body {
      min-height: 100vh;
      overflow-x: hidden;
    }

    .page {
      min-height: 100vh;
      padding: 28px 26px 22px;
      display: flex;
      flex-direction: column;
      gap: 22px;
    }

    .top {
      position: relative;
      text-align: center;
    }

    .back {
       position: absolute;
       left: 10px;
       top: 110px;
       font-size: 25px;
       font-weight: bold;
       color: #f2c94c;
       cursor: pointer;
    }

    .title {
      margin: 0;
      font-size: 30px;
      font-weight: 900;
      color: #f2c94c;
    }

    .subtitle {
      margin-top: 10px;
      font-size: 42px;
      font-weight: bold;
      color: #f2c94c;
      letter-spacing: 3px;
    }

    .client-card {
      border: 1.5px solid rgba(222, 166, 74, 0.55);
      border-radius: 18px;
      padding: 22px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(12, 24, 38, 0.82);
      box-shadow: 0 16px 35px rgba(0,0,0,0.25);
    }

    .client-left {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .avatar {
      width: 70px;
      height: 70px;
      border-radius: 50%;
      border: 2px solid rgba(237, 188, 95, 0.65);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 38px;
      color: #f4c363;
      flex-shrink: 0;
    }

    .label {
      color: #f4c363;
      font-size: 17px;
      font-weight: 800;
      letter-spacing: 0.5px;
    }

    .client-name {
      margin-top: 6px;
      font-size: 30px;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .phone {
      font-size: 22px;
      color: #fff;
      display: flex;
      align-items: center;
      gap: 10px;
      white-space: nowrap;
    }

    .section-title {
      display: flex;
      align-items: center;
      gap: 16px;
      margin-top: 2px;
    }

    .clock-small {
      width: 48px;
      height: 48px;
      border: 3px solid #f4c363;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #f4c363;
      font-size: 25px;
      flex-shrink: 0;
    }

    .section-title h2 {
      margin: 0;
      font-size: 27px;
      line-height: 1.1;
    }

    .section-title p {
      margin: 8px 0 0;
      font-size: 18px;
      color: rgba(255,255,255,0.65);
    }

    .duration-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 18px;
      flex: 1;
    }

    .duration-card {
      position: relative;
      min-height: 100px;
      border-radius: 24px;
      border: 1.5px solid rgba(255,255,255,0.18);
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.08), transparent 35%),
        rgba(10, 22, 36, 0.86);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      cursor: pointer;
      box-shadow: 0 14px 34px rgba(0,0,0,0.25);
      transition: 0.18s ease;
    }

    .duration-card.selected {
      border: 2.5px solid #f4c363;
      background:
        radial-gradient(circle at top left, rgba(255, 218, 137, 0.14), transparent 40%),
        linear-gradient(145deg, rgba(36,48,50,0.95), rgba(8,20,33,0.95));
      box-shadow: 0 0 0 1px rgba(244,195,99,0.18), 0 18px 42px rgba(0,0,0,0.35);
    }

    .check {
      display: none;
      position: absolute;
      right: 22px;
      top: 22px;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ffe28a, #d9972f);
      color: #06111c;
      font-size: 30px;
      font-weight: 900;
      align-items: center;
      justify-content: center;
    }

    .duration-card.selected .check {
      display: flex;
    }

    .duration-icon {
      font-size: 54px;
      color: #f4c363;
      margin-bottom: 18px;
    }

    .duration-main {
      font-size: 38px;
      font-weight: 900;
      letter-spacing: 0.5px;
    }

    .duration-sub {
      margin-top: 8px;
      font-size: 21px;
      color: rgba(255,255,255,0.68);
      font-weight: 600;
    }

    .selected-box {
      border: 1.5px solid rgba(255,255,255,0.16);
      border-radius: 22px;
      padding: 20px 26px;
      display: flex;
      align-items: center;
      gap: 22px;
      background: rgba(10, 22, 36, 0.88);
      box-shadow: 0 14px 32px rgba(0,0,0,0.22);
    }

    .calendar-icon {
      width: 66px;
      height: 66px;
      border-radius: 50%;
      background: rgba(244, 195, 99, 0.22);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 34px;
      color: #ffe28a;
      flex-shrink: 0;
    }

    .selected-label {
      font-size: 18px;
      color: rgba(255,255,255,0.65);
      margin-bottom: 5px;
    }

    .selected-value {
      font-size: 31px;
      font-weight: 900;
      color: #ffe28a;
    }

    .next-btn {
      width: 100%;
      border: none;
      border-radius: 24px;
      padding: 24px 20px;
      background: linear-gradient(145deg, #f6d257, #a96f10);
      color: #06111c;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 18px 42px rgba(0,0,0,0.36);
    }

    .next-arrow {
      width: 64px;
      height: 64px;
      border-radius: 50%;
      background: #071320;
      color: #f4c363;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 43px;
      flex-shrink: 0;
    }

    .next-text-main {
      font-size: 31px;
      line-height: 1.05;
    }

    .next-text-sub {
      font-size: 18px;
      font-weight: 600;
      margin-top: 6px;
    }

    @media (max-width: 520px) {
      .page {
        padding: 22px 16px 18px;
        gap: 18px;
      }

      .title {
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 3px;
        color: #f2c94c;
        margin-bottom: 18px;
      }

      .subtitle {
         margin-top: 10px;
         font-size: 42px;
         font-weight: bold;
         color: #f2c94c;
         letter-spacing: 3px;
      }

      .client-card {
        padding: 18px;
      }

      .avatar {
        width: 58px;
        height: 58px;
        font-size: 32px;
      }

      .client-name {
        font-size: 24px;
      }

      .phone {
        display: none;
      }

      .duration-card {
        min-height: 150px;
      }

      .duration-main {
        font-size: 31px;
      }

      .duration-sub {
        font-size: 18px;
      }

      .duration-icon {
        font-size: 46px;
        margin-bottom: 12px;
      }

      .next-text-main {
        font-size: 26px;
      }
    }

/* AICI ADAUGI */

.steps {
  display: flex;
  justify-content: center;
  align-items: center;
  margin: 30px 0;
}

.step {
  width: 70px;
  height: 70px;
  border-radius: 50%;
  border: 3px solid #d4af37;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 30px;
  font-weight: bold;
}

.step.active {
  background: #f2c94c;
  color: #000;
}

.line {
  width: 45px;
  height: 3px;
  background: #d4af37;
}

  </style>
</head>

<body>
  <div class="page">

    <div class="top">
      <div class="back" onclick="window.location.href='<?= scriptUrl ?>'">
      ← MENIU PRINCIPAL
    </div>
      <h1 class="title">Programare noua</h1>
      <div class="subtitle">ALEGE DURATA</div>
    </div>
    <div class="steps">
    <div class="step">1</div>
    <div class="line"></div>
    <div class="step active">2</div>
    <div class="line"></div>
    <div class="step">3</div>
    <div class="line"></div>
    <div class="step">4</div>
  </div>

    <div class="client-card">
      <div class="client-left">
        <div class="avatar">👤</div>
        <div>
          <div class="label">CLIENT SELECTAT</div>
          <div class="client-name" id="clientName">Ionuț Popescu</div>
        </div>
      </div>
      <div class="phone">☎ <span id="clientPhone">+40 712 345 678</span></div>
    </div>

    <div class="section-title">
      <div class="clock-small">◷</div>
      <div>
        <h2>Alege durata programării</h2>
        <p>Durata programării</p>
      </div>
    </div>

    <div class="duration-grid">
      <div class="duration-card selected" onclick="selectDuration(30, this)">
        <div class="check">✓</div>
        <div class="duration-icon">⏱</div>
        <div class="duration-main">30 MIN</div>
        <div class="duration-sub">Rapid</div>
      </div>

      <div class="duration-card" onclick="selectDuration(60, this)">
        <div class="check">✓</div>
        <div class="duration-icon">⏱</div>
        <div class="duration-main">60 MIN</div>
        <div class="duration-sub">Standard</div>
      </div>

      <div class="duration-card" onclick="selectDuration(90, this)">
        <div class="check">✓</div>
        <div class="duration-icon">⏱</div>
        <div class="duration-main">90 MIN</div>
        <div class="duration-sub">Complex</div>
      </div>

      <div class="duration-card" onclick="selectDuration(120, this)">
        <div class="check">✓</div>
        <div class="duration-icon">⏱</div>
        <div class="duration-main">120 MIN</div>
        <div class="duration-sub">Complet</div>
      </div>
    </div>

    <div class="selected-box">
      <div class="calendar-icon">📅</div>
      <div>
        <div class="selected-label">Durata selectată</div>
        <div class="selected-value" id="selectedDuration">30 minute</div>
      </div>
    </div>

    <button class="next-btn" onclick="nextStep()">
      <div>
        <div class="next-text-main">Următorul pas</div>
      </div>
    </button>

  </div>

<script>
  let durataSelectata = 30;

  function initPage() {
    const clientNume = localStorage.getItem("client_nume") || "-";
    const clientTelefon = localStorage.getItem("client_telefon") || "-";

    document.getElementById("clientName").textContent = clientNume;
    document.getElementById("clientPhone").textContent = clientTelefon;
  }

  function selectDuration(minutes, element) {
    durataSelectata = minutes;

    document.querySelectorAll('.duration-card').forEach(card => {
      card.classList.remove('selected');
    });

    element.classList.add('selected');
    document.getElementById('selectedDuration').textContent = minutes + ' minute';
  }

  function goBack() {
    window.top.location.href = "<?= scriptUrl ?>?page=programare_demo_pg1";
  }

  function nextStep() {
    localStorage.setItem("durata_programare", durataSelectata);
    window.top.location.href = "<?= scriptUrl ?>?page=programare_demo_pg3";
  }

  initPage();
</script>
</body>
</html>
